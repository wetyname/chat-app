<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }
#chat { height:85vh; overflow-y:scroll; padding:10px; display:flex; flex-direction:column; }
.msg { padding:10px; margin:5px; border-radius:10px; max-width:70%; }
.left { background:#1e293b; align-self:flex-start; }
.right { background:#3b82f6; align-self:flex-end; }
.system { text-align:center; color:#94a3b8; font-size:12px; }
#bottom { display:flex; padding:10px; background:#1e293b; }
#msg { flex:1; padding:10px; border:none; }
button { width:60px; background:#3b82f6; color:white; border:none; }
</style>
</head>
<body>

<div id="chat"></div>

<div id="bottom">
    <input id="msg">
    <button onclick="sendMsg()">▶</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script>
var socket = io();
var myName = "{{ name }}";

function sendMsg(){
    let msg = document.getElementById("msg").value;
    if(msg==="") return;
    socket.emit("message",{msg:msg});
    document.getElementById("msg").value="";
}

document.addEventListener("keydown", e => {
    if(e.key==="Enter") sendMsg();
});

socket.on("message", function(data){
    let div = document.createElement("div");

    if(data.type==="system"){
        div.className="system";
        div.innerText=data.msg;
    } else {
        div.className="msg " + (data.name===myName?"right":"left");
        div.innerHTML="<b>"+data.name+":</b><br>"+data.msg;
    }

    document.getElementById("chat").appendChild(div);
});
</script>

</body>
</html>
