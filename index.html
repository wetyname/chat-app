<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Chat</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; }
        #chat { height: 85vh; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }

        /* Цвета сообщений вернулись! */
        .msg { padding: 10px; margin: 5px; border-radius: 10px; max-width: 70%; word-wrap: break-word; }
        .left { background: #1e293b; align-self: flex-start; }
        .right { background: #3b82f6; align-self: flex-end; }
        .system-msg { text-align: center; background: rgba(255, 255, 255, 0.1); margin: 10px auto; padding: 5px 15px; border-radius: 20px; font-size: 0.85em; color: #94a3b8; }

        #login { text-align: center; margin-top: 10%; padding: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; max-width: 300px; margin-left: auto; margin-right: auto; }
        .input-group label { display: block; font-size: 0.9em; margin-bottom: 5px; color: #94a3b8; }
        .input-group input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }

        #bottom { display: flex; padding: 10px; background: #1e293b; gap: 5px; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        #msg { flex-grow: 1; padding: 10px; border-radius: 5px; border: none; outline: none; }
        button { padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        small { opacity: 0.7; font-size: 0.7em; margin-left: 5px; }
    </style>
</head>
<body>

<div id="login">
    <h2>Вітаємо у чаті!</h2>
    <div class="input-group">
        <label>Ваш нік (логін):</label>
        <input id="name_input" placeholder="Наприклад: Костік">
    </div>
    <div class="input-group">
        <label>Електронна пошта (для нових):</label>
        <input id="email_input" placeholder="mail@example.com">
    </div>
    <div class="input-group">
        <label>Пароль:</label>
        <input id="password" type="password" placeholder="Введіть пароль">
    </div>
    <button onclick="start()">Увійти / Реєстрація</button>
</div>

<div id="app" style="display:none;">
    <div id="chat"></div>
    <div id="bottom">
        <input id="msg" placeholder="Напишіть щось...">
        <input type="file" id="file" style="display:none" onchange="sendPhoto(this)" accept="image/*">
        <button onclick="document.getElementById('file').click()">📎</button>
        <button onclick="sendMsg()">Вiдправити</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script>
    var socket = io();
    var myName = "";

    function start() {
        let loginVal = document.getElementById("name_input").value;
        let pass = document.getElementById("password").value;
        let email = document.getElementById("email_input").value;
        if (!loginVal || !pass) return alert("Введіть нік та пароль!");
        myName = loginVal;
        socket.emit("authenticate", {name: loginVal, pass: pass, email: email});
    }

    socket.on("auth_success", function () {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "block";
    });

    socket.on("error_msg", function (msg) { alert(msg); });

    function sendMsg() {
        let input = document.getElementById("msg");
        if (input.value.trim() === "") return;
        socket.emit("message", {msg: input.value, is_img: false});
        input.value = "";
    }

    function sendPhoto(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => socket.emit("message", {msg: e.target.result, is_img: true});
        reader.readAsDataURL(file);
    }

    socket.on("message", function (data) {
        let chat = document.getElementById("chat");
        let div = document.createElement("div");
        if (data.is_sys) {
            div.className = "system-msg";
            div.innerHTML = `<span>${data.msg} <small>${data.time || ''}</small></span>`;
        } else {
            div.className = "msg " + (data.name === myName ? "right" : "left");
            let content = data.is_img ? `<img src="${data.msg}" style="max-width:100%; border-radius:5px;">` : data.msg;
            div.innerHTML = `<b>${data.name}</b> <small>${data.time}</small><br>${content}`;
        }
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    });

    document.addEventListener("keydown", (e) => { if (e.key === "Enter") sendMsg(); });
</script>
</body>
</html>
