<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Chat</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; }
        #chat { height: 80vh; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
        .msg { padding: 10px; margin: 5px; border-radius: 10px; max-width: 70%; word-wrap: break-word; }
        .left { background: #1e293b; align-self: flex-start; }
        .right { background: #3b82f6; align-self: flex-end; }
        .system-msg { text-align: center; background: rgba(255, 255, 255, 0.1); margin: 10px auto; padding: 5px 15px; border-radius: 20px; font-size: 0.85em; color: #94a3b8; }
        #login { text-align: center; padding: 20px; }
        .input-group { margin-bottom: 15px; max-width: 300px; margin-left: auto; margin-right: auto; }
        .input-group input { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
        #bottom { display: flex; padding: 10px; background: #1e293b; gap: 5px; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        #msg { flex-grow: 1; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login">
    <h2>Вхід</h2>
    <div class="input-group"><input id="name_input" placeholder="Логін"></div>
    <div class="input-group"><input id="email_input" placeholder="Пошта (об'язково)"></div>
    <div class="input-group"><input id="password" type="password" placeholder="Пароль"></div>
    <button onclick="start()">Увійти</button>
</div>

<div id="app" style="display:none;">
    <div id="chat"></div>
    <div id="bottom">
        <input id="msg" placeholder="Повідомлення...">
        <button onclick="sendMsg()">➤</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script>
    var socket = io();
    var myName = "";

    function start() {
        let login = document.getElementById("name_input").value;
        let email = document.getElementById("email_input").value;
        let pass = document.getElementById("password").value;
        if (!email || !pass) return alert("Введіть пошту та пароль!");

        // Если логин пустой, используем часть почты до @ как ник
        myName = login || email.split('@')[0];
        socket.emit("authenticate", {name: myName, pass: pass, email: email});
    }

    socket.on("auth_success", () => {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "block";
    });

    socket.on("error_msg", (msg) => alert(msg));

    function sendMsg() {
        let input = document.getElementById("msg");
        if (input.value.trim()) {
            socket.emit("message", {msg: input.value, is_img: false});
            input.value = "";
        }
    }

    socket.on("message", (data) => {
        let chat = document.getElementById("chat");
        let div = document.createElement("div");
        div.className = data.is_sys ? "system-msg" : "msg " + (data.name === myName ? "right" : "left");
        div.innerHTML = `<b>${data.name}</b>: ${data.msg}`;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    });
</script>
</body>
</html>
