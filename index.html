<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Chat</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #0f172a; color: white; }
        #chat { height: 80vh; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
        .msg { padding: 10px; margin: 5px; border-radius: 10px; max-width: 70%; }
        .left { background: #1e293b; align-self: flex-start; }
        .right { background: #3b82f6; align-self: flex-end; }
        .system-msg { text-align: center; color: #94a3b8; font-size: 0.8em; margin: 10px; }
        #login { text-align: center; padding: 50px 20px; }
        .input-group { margin-bottom: 15px; max-width: 300px; margin-left: auto; margin-right: auto; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; color: #94a3b8; }
        input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #334155; background: #1e293b; color: white; box-sizing: border-box; }
        #bottom { display: flex; padding: 10px; background: #1e293b; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        button { padding: 10px; background: #3b82f6; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div id="login">
    <h2>Вхід у чат</h2>
    <div class="input-group">
        <label>Нікнейм (Логін):</label>
        <input id="name_input" placeholder="Ваш нік">
    </div>
    <div class="input-group">
        <label>Пароль:</label>
        <input id="password" type="password" placeholder="Ваш пароль">
    </div>
    <div class="input-group">
        <label>Електронна пошта (для нових):</label>
        <input id="email_input" placeholder="email@example.com">
    </div>
    <button onclick="start()">Увійти / Реєстрація</button>
</div>

<div id="app" style="display:none;">
    <div id="chat"></div>
    <div id="bottom">
        <input id="msg" placeholder="Напишіть повідомлення...">
        <button onclick="sendMsg()">Відправити</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script>
    var socket = io();
    var myName = "";

    function start() {
        let name = document.getElementById("name_input").value;
        let pass = document.getElementById("password").value;
        let email = document.getElementById("email_input").value;

        if (!name || !pass) {
            alert("Нік та пароль обов'язкові!");
            return;
        }

        myName = name;
        socket.emit("authenticate", {name: name, pass: pass, email: email});
    }

    socket.on("auth_success", function () {
        document.getElementById("login").style.display = "none";
        document.getElementById("app").style.display = "block";
    });

    socket.on("error_msg", function (msg) { alert(msg); });

    function sendMsg() {
        let input = document.getElementById("msg");
        if (input.value.trim() === "") return;
        socket.emit("message", {msg: input.value});
        input.value = "";
    }

    socket.on("message", function (data) {
        let chat = document.getElementById("chat");
        let div = document.createElement("div");
        if (data.is_sys) {
            div.className = "system-msg";
            div.innerText = data.msg;
        } else {
            div.className = "msg " + (data.name === myName ? "right" : "left");
            div.innerHTML = `<b>${data.name}</b>: ${data.msg}`;
        }
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    });
</script>
</body>
</html>
