<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Style Chat</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #0e1621; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        
        /* Чат */
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-attachment: fixed; }
        
        /* Бульбашки повідомлень */
        .msg-row { display: flex; gap: 8px; max-width: 80%; }
        .my-row { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { background: #182533; padding: 8px 12px; border-radius: 12px; position: relative; word-wrap: break-word; }
        .my-row .bubble { background: #2b5278; }
        .msg-img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        
        /* Кружечок */
        .video-circle { width: 220px; height: 220px; border-radius: 50%; object-fit: cover; border: 2px solid #2b5278; display: block; }

        /* Панель вводу */
        #input-area { background: #17212b; padding: 10px; display: flex; align-items: center; gap: 12px; }
        .in-field { flex-grow: 1; background: none; border: none; color: white; outline: none; font-size: 16px; }
        
        /* Кнопки */
        .icon-btn { background: none; border: none; cursor: pointer; color: #6c7883; font-size: 24px; padding: 5px; transition: 0.2s; }
        .icon-btn:hover { color: #5288c1; }
        .rec-active { color: #ef4444 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="chat-box"></div>

<div id="input-area">
    <button class="icon-btn" onclick="document.getElementById('file-input').click()">📎</button>
    <input type="file" id="file-input" style="display:none" accept="image/*" onchange="sendImg(event)">
    
    <input type="text" id="msg-input" class="in-field" placeholder="Повідомлення..." onkeypress="if(event.key==='Enter')sendTxt()">
    
    <button id="rec-btn" class="icon-btn" onclick="toggleRec()">📷</button>
    <button class="icon-btn" style="color:#5288c1" onclick="sendTxt()">➤</button>
</div>

<script>
    const socket = io();
    let myNick = "Користувач", myReal = "user_" + Math.random().toString(16).slice(2, 8), myAva = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
    let mediaRecorder, chunks = [];

    // Відправка тексту
    function sendTxt() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        socket.emit('message', { username: myNick, real_nick: myReal, avatar: myAva, message: inp.value, type: 'text' });
        inp.value = "";
    }

    // Відправка фото
    function sendImg(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = () => socket.emit('message', { username: myNick, real_nick: myReal, avatar: myAva, file: reader.result, type: 'image' });
        reader.readAsDataURL(file);
    }

    // Запис кружечка
    async function toggleRec() {
        const btn = document.getElementById('rec-btn');
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            mediaRecorder = new MediaRecorder(stream);
            chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: "video/webm" });
                const reader = new FileReader();
                reader.onloadend = () => socket.emit('message', { username: myNick, real_nick: myReal, avatar: myAva, file: reader.result, type: 'circle' });
                reader.readAsDataURL(blob);
                stream.getTracks().forEach(t => t.stop());
            };
            mediaRecorder.start();
            btn.classList.add('rec-active');
            btn.innerText = "⏹";
        } else {
            mediaRecorder.stop();
            btn.classList.remove('rec-active');
            btn.innerText = "📷";
        }
    }

    // ВІДОБРАЖЕННЯ ПОВІДОМЛЕНЬ (Тут була помилка)
    socket.on('message', d => {
        const box = document.getElementById('chat-box');
        const row = document.createElement('div');
        row.className = "msg-row " + (d.real_nick === myReal ? "my-row" : "");
        
        let content = "";
        if (d.type === 'text') content = `<div>${d.message}</div>`;
        if (d.type === 'image') content = `<img src="${d.file}" style="max-width:250px; border-radius:10px;">`;
        if (d.type === 'circle') content = `<video src="${d.file}" class="video-circle" autoplay muted loop></video>`;

        row.innerHTML = `<img src="${d.avatar}" class="msg-img"><div class="bubble"><b>${d.username}</b><br>${content}</div>`;
        box.appendChild(row);
        box.scrollTop = box.scrollHeight;
    });
</script>

</body>
</html>
