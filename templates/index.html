<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чат</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; background-color: #1a2a6c; font-family: sans-serif; }
        #login-form { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2a3a7c; padding: 20px; border-radius: 15px; width: 80%; max-width: 300px; text-align: center; z-index: 100; }
        #chat-area { display: none; flex-direction: column; height: 100vh; width: 100vw; }
        #chat-box { flex-grow: 1; background: #0f172a; overflow-y: auto; padding: 15px; color: white; display: flex; flex-direction: column; }
        #input-area { background: #1e293b; padding: 10px; display: flex; gap: 5px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #3a4a8c; background: #0f172a; color: white; font-size: 16px; }
        button { padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .msg { margin-bottom: 8px; word-wrap: break-word; }
        .sys { color: #94a3b8; text-align: center; font-style: italic; margin: 5px 0; }
    </style>
</head>
<body>

    <div id="login-form">
        <h2 style="color:white">Вхід</h2>
        <input type="text" id="u-nick" placeholder="Нік" style="width:90%"><br><br>
        <input type="email" id="u-email" placeholder="Пошта" style="width:90%"><br><br>
        <input type="password" id="u-pass" placeholder="Пароль" style="width:90%"><br><br>
        <button onclick="enterChat()" style="width:100%">Увійти</button>
    </div>

    <div id="chat-area">
        <div id="chat-box" id="box"></div>
        <div id="input-area">
            <input type="text" id="m-text" placeholder="Повідомлення..." style="flex-grow:1">
            <button onclick="sendMsg()">Мяк!</button>
        </div>
    </div>

    <script>
        var socket = io();
        var myName = "";
        var myID = "";

        function enterChat() {
            var n = document.getElementById('u-nick').value.trim();
            var e = document.getElementById('u-email').value.trim();
            var p = document.getElementById('u-pass').value;

            if(!n || !e || !p) { alert("Заповни все!"); return; }

            if(n === "adminkgv2015" && p === "gkv777555111a") {
                myName = "Костя Гончаров";
                myID = "adminkgv2015";
            } else {
                myName = n;
                myID = n;
            }

            document.getElementById('login-form').style.display = 'none';
            document.getElementById('chat-area').style.display = 'flex';

            socket.emit('message', {'username': 'Система', 'message': myName + ' увійшов у чат'});
        }

        function sendMsg() {
            var inp = document.getElementById('m-text');
            if(inp.value.trim() !== "") {
                socket.emit('message', {'username': myID, 'message': inp.value});
                inp.value = "";
            }
        }

        socket.on('message', function(data) {
            var box = document.getElementById('chat-box');
            var div = document.createElement('div');

            if(data.username === "Система") {
                div.className = "sys";
                div.innerHTML = "— " + data.message + " —";
            } else {
                var disp = (data.username === "adminkgv2015") ? "Костя Гончаров" : data.username;
                var col = (data.username === "adminkgv2015") ? "#facc15" : "#60a5fa";
                div.className = "msg";
                div.innerHTML = `<strong style="color:${col}">${disp}</strong>: ${data.message}`;
            }

            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });
    </script>
</body>
</html>
