<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chat beta 1.6</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #0e1621; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* ВІКНО ЛОГІНУ */
        #login-overlay { position: fixed; inset: 0; background: #17212b; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #0e1621; padding: 30px; border-radius: 15px; display: flex; flex-direction: column; gap: 12px; width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .login-card input { padding: 12px; border-radius: 8px; border: 1px solid #2b5278; background: #17212b; color: white; outline: none; }
        .login-card button { padding: 12px; background: #2b5278; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        /* ІНТЕРФЕЙС ЧАТУ */
        #main-ui { display: none; flex-direction: column; height: 100vh; }
        
        /* ПАНЕЛЬ МУЗИКИ ТА ОНЛАЙНУ */
        #top-bar { background: #17212b; padding: 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #2b5278; }
        #online-counter { color: yellow; font-weight: bold; font-size: 14px; white-space: nowrap; }
        
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #0e1621; }

        /* ПРЕВ'Ю КРУЖЕЧКА */
        #preview-container { display: none; position: fixed; bottom: 100px; right: 20px; z-index: 1000; }
        #v-preview { width: 160px; height: 160px; border-radius: 50%; object-fit: cover; border: 4px solid #ef4444; background: black; }

        /* ПОВІДОМЛЕННЯ */
        .msg-row { display: flex; gap: 10px; max-width: 85%; align-items: flex-end; margin-bottom: 5px; }
        .my-row { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { background: #182533; padding: 10px; border-radius: 15px; position: relative; word-wrap: break-word; min-width: 60px; }
        .my-row .bubble { background: #2b5278; }
        .msg-time { font-size: 10px; color: #8fa1b3; margin-top: 5px; display: block; text-align: right; }
        .msg-img-ava { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        
        .video-circle { width: 220px; height: 220px; border-radius: 50%; object-fit: cover; background: black; border: 2px solid #5288c1; }

        
#input-area { 
    background: #17212b; 
    padding: 10px 10px 25px 10px; /* Додав 25px знизу для телефонів */
    display: none; 
    align-items: center; 
    gap: 10px; 
    border-top: 1px solid #2b5278;
    min-height: 70px; /* Робимо панель трохи вищою */
}
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h3 style="text-align:center; margin:0 0 10px 0;">Вхід</h3>
        <input type="text" id="u-nick" placeholder="Нікнейм">
        <input type="password" id="u-pass" placeholder="Пароль">
        <input type="email" id="u-email" placeholder="Електронна пошта">
        <button onclick="auth()">УВІЙТИ</button>
    </div>
</div>

<div id="main-ui">
    <div id="top-bar">
        <div id="online-counter">В мережі: <span id="user-count">0</span></div>
        <button class="icon-btn" onclick="document.getElementById('m-pick').click()">🎵+</button>
        <audio id="bg-audio" controls style="height:30px; flex-grow:1;"></audio>
        <input type="file" id="m-pick" style="display:none" accept="audio/*" onchange="addMusic(event)">
    </div>
    
    <div id="preview-container">
        <video id="v-preview" autoplay muted playsinline></video>
    </div>
    
    <div id="chat-box"></div>

    <div id="input-area">
        <button class="icon-btn" onclick="document.getElementById('f-input').click()">📎</button>
        <input type="file" id="f-input" style="display:none" accept="image/*" onchange="sendImg(event)">
        
        <input type="text" id="msg-input" class="in-field" placeholder="Повідомлення..." onkeypress="if(event.key==='Enter')sendTxt()">
        
        <button id="flip-btn" class="icon-btn" style="display:none;" onclick="switchCam()">🔄</button>
        
        <button id="rec-btn" class="icon-btn" onclick="toggleRec()">📷</button>
        <button class="icon-btn" style="color:#5288c1" onclick="sendTxt()">➤</button>
    </div>
</div>

<script>
    const socket = io();
    let myNick, myReal, myAva, facingMode = "user", mediaRecorder, chunks = [], currentStream;

    function auth() {
        const n = document.getElementById('u-nick').value;
        const p = document.getElementById('u-pass').value;
        const e = document.getElementById('u-email').value;
        if(n && p) {
            socket.emit('register_or_login', {nick: n, pass: p, email: e});
        } else {
            alert("Введіть нік та пароль!");
        }
    }

    socket.on('auth_success', d => {
        myNick = d.nick; myReal = d.real_nick; myAva = d.avatar;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-ui').style.display = 'flex';
        document.getElementById('input-area').style.display = 'flex';
    });

    socket.on('auth_error', d => alert(d.msg));
    socket.on('update_online', d => document.getElementById('user-count').innerText = d.count);

    // ФУНКЦІЯ МУЗИКИ
    function addMusic(e) {
        if(e.target.files[0]) {
            const a = document.getElementById('bg-audio');
            a.src = URL.createObjectURL(e.target.files[0]);
            a.play();
        }
    }

    function sendTxt() {
        const i = document.getElementById('msg-input');
        if(!i.value.trim()) return;
        socket.emit('message', {username: myNick, real_nick: myReal, avatar: myAva, message: i.value, type: 'text'});
        i.value = "";
    }

    function sendImg(e) {
        const file = e.target.files[0];
        if(!file) return;
        const r = new FileReader();
        r.onload = () => socket.emit('message', {username: myNick, real_nick: myReal, avatar: myAva, file: r.result, type: 'image'});
        r.readAsDataURL(file);
    }

    async function switchCam() {
        facingMode = (facingMode === "user") ? "environment" : "user";
        if (currentStream) {
            currentStream.getTracks().forEach(t => t.stop());
            currentStream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: facingMode }, audio: true 
            });
            document.getElementById('v-preview').srcObject = currentStream;
        }
    }

    async function toggleRec() {
        const btn = document.getElementById('rec-btn');
        const flipBtn = document.getElementById('flip-btn');
        const preview = document.getElementById('preview-container');
        const vHead = document.getElementById('v-preview');

        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: facingMode }, audio: true 
                });
                vHead.srcObject = currentStream;
                preview.style.display = 'block';
                flipBtn.style.display = 'inline-block';

                mediaRecorder = new MediaRecorder(currentStream);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const b = new Blob(chunks, {type: "video/webm"});
                    const r = new FileReader();
                    r.onloadend = () => socket.emit('message', {username: myNick, real_nick: myReal, avatar: myAva, file: r.result, type: 'circle'});
                    r.readAsDataURL(b);
                    currentStream.getTracks().forEach(t => t.stop());
                    preview.style.display = 'none';
                    flipBtn.style.display = 'none';
                };
                mediaRecorder.start();
                btn.classList.add('rec-active');
            } catch(e) { alert("Потрібен доступ до камери та мікрофона!"); }
        } else {
            mediaRecorder.stop();
            btn.classList.remove('rec-active');
        }
    }

    socket.on('message', d => {
        const box = document.getElementById('chat-box');
        const row = document.createElement('div');
        row.className = "msg-row " + (d.real_nick === myReal ? "my-row" : "");
        
        let html = "";
        if(d.type === 'text') html = `<div>${d.message}</div>`;
        else if(d.type === 'image') html = `<img src="${d.file}" style="max-width:250px; border-radius:10px;">`;
        else if(d.type === 'circle') html = `<video src="${d.file}" class="video-circle" autoplay loop playsinline muted onclick="this.muted=!this.muted"></video>`;
        
        row.innerHTML = `
            <img src="${d.avatar}" class="msg-img-ava">
            <div class="bubble">
                <b>${d.username}</b><br>${html}
                <span class="msg-time">${d.time || ''}</span>
            </div>`;
        box.appendChild(row);
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
