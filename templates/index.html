<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Pro v1.9</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Оновлена панель музики без зайвих кнопок */
        #music-panel { 
            background: #1e293b; padding: 10px; border-bottom: 1px solid #334155; 
            display: flex; align-items: center; gap: 10px; 
        }
        
        /* Цей код приховує кнопку з трьома крапками у Chrome та інших браузерах */
        audio::-webkit-media-controls-enclosure { overflow: hidden; }
        audio::-webkit-media-controls-panel { width: calc(100% + 30px); }

        #bg-audio { flex-grow: 1; height: 32px; background: #f1f5f9; border-radius: 30px; }
        
        .music-btn { background: #334155; color: #facc15; border: 1px solid #475569; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; white-space: nowrap; }

        /* Решта стилів */
        .ava-setup { position: relative; width: 70px; height: 70px; margin-bottom: 10px; }
        #my-ava-prev { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid #2563eb; background: #334155; }
        .plus { position: absolute; bottom: 0; right: 0; background: #2563eb; width: 22px; height: 22px; border-radius: 50%; border: none; color: white; cursor: pointer; font-size: 14px; }
        #login-form { position: fixed; inset: 0; background: #1e293b; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 12px; padding: 20px; }
        .in-field { width: 100%; max-width: 300px; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; outline: none; }
        #chat-area { display: none; flex-direction: column; height: 100%; }
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg-row { display: flex; gap: 10px; max-width: 85%; align-items: flex-start; }
        .my-row { align-self: flex-end; flex-direction: row-reverse; }
        .msg-ava { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .bubble { background: #334155; padding: 10px; border-radius: 12px; position: relative; }
        .my-row .bubble { background: #1e40af; }
        .del-x { color: #94a3b8; cursor: pointer; margin-left: 8px; border: none; background: none; font-size: 0.8em; }
        #online { text-align: center; padding: 5px; color: #facc15; font-size: 0.8em; background: #1e293b; border-bottom: 1px solid #334155; }
    </style>
</head>
<body onclick="initAudio()">

    <audio id="drop-sound" src="https://www.soundjay.com/buttons/sounds/button-20.mp3"></audio>

    <div id="login-form">
        <div class="ava-setup">
            <img id="my-ava-prev" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <button class="plus" onclick="document.getElementById('ava-input').click()">+</button>
        </div>
        <input type="file" id="ava-input" accept="image/*" style="display:none" onchange="previewAva(event)">
        <input type="text" id="u-nick" class="in-field" placeholder="Нікнейм">
        <input type="password" id="u-pass" class="in-field" placeholder="Пароль">
        <input type="email" id="u-email" class="in-field" placeholder="Пошта">
        <button class="in-field" style="background:#2563eb; color:white; font-weight:bold; cursor:pointer;" onclick="auth()">Увійти</button>
        <p id="err" style="color:#ef4444; font-size:0.8em;"></p>
    </div>

    <div id="chat-area">
        <div id="music-panel">
            <button class="music-btn" onclick="document.getElementById('file-input').click()">🎵 Музика</button>
            <input type="file" id="file-input" accept="audio/*" style="display:none" onchange="loadMusic(event)">
            <audio id="bg-audio" controls controlsList="nodownload noplaybackrate"></audio>
        </div>

        <div id="online">В мережі: 0</div>
        <div id="chat-box"></div>

        <div style="padding:10px; display:flex; gap:10px; background:#1e293b;">
            <input type="text" id="m-text" class="in-field" style="flex-grow:1;" placeholder="Повідомлення..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" style="background:#2563eb; color:white; border:none; width:50px; border-radius:8px; cursor:pointer;">></button>
        </div>
    </div>

    <script>
        var socket = io();
        var myNick = "", myReal = "", myAvaData = "https://cdn-icons-png.flaticon.com/512/149/149071.png";
        
        function initAudio() {}

        function previewAva(e) {
            let f = e.target.files[0];
            if(f) {
                let r = new FileReader();
                r.onload = (ev) => { myAvaData = ev.target.result; document.getElementById('my-ava-prev').src = myAvaData; };
                r.readAsDataURL(f);
            }
        }

        function loadMusic(e) {
            let f = e.target.files[0];
            if(f) {
                let player = document.getElementById('bg-audio');
                player.src = URL.createObjectURL(f);
                player.play();
            }
        }

        function auth() {
            let n = document.getElementById('u-nick').value.trim();
            let p = document.getElementById('u-pass').value;
            let e = document.getElementById('u-email').value.trim();
            socket.emit('register_or_login', {nick: n, pass: p, email: e});
        }

        socket.on('auth_success', d => {
            myNick = d.nick; myReal = d.real_nick;
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('chat-area').style.display = 'flex';
        });

        socket.on('auth_error', d => { document.getElementById('err').innerText = d.msg; });

        socket.on('update_online', d => {
            document.getElementById('online').innerText = "В мережі: " + d.count;
        });

        function send() {
            let t = document.getElementById('m-text'), txt = t.value.trim();
            if(!txt) return;
            let id = "msg-" + Date.now();
            socket.emit('message', {
                username: myNick, 
                real_nick: myReal, 
                message: txt, 
                msg_id: id, 
                avatar: myAvaData
            });
            t.value = "";
        }

        socket.on('message', d => {
            let b = document.getElementById('chat-box');
            if (d.username !== myNick) document.getElementById('drop-sound').play().catch(()=>{});
            
            let row = document.createElement('div');
            let isMy = d.username === myNick;
            row.className = "msg-row" + (isMy ? " my-row" : "");
            row.id = d.msg_id;

            let ava = `<img class="msg-ava" src="${d.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}">`;
            let del = isMy ? `<button class="del-x" onclick="reqDel('${d.msg_id}')">✖</button>` : "";
            
            row.innerHTML = `${ava}<div class="bubble"><b>${d.username}</b><br>${d.message}${del}</div>`;
            b.appendChild(row);
            b.scrollTop = b.scrollHeight;
        });

        function reqDel(id) { socket.emit('delete_message', {msg_id: id}); }
        socket.on('remove_msg', d => { let el = document.getElementById(d.msg_id); if(el) el.remove(); });
    </script>
</body>
</html>
