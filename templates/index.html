<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Подслушано Недогарки</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #0e1621; color: white; font-family: sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        #main-ui { display: flex; flex-direction: column; height: 100%; }
        
        /* Шапка */
        #top-bar { background: #17212b; padding: 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #2b5278; }
        
        /* Стрічка повідомлень */
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Повідомлення */
        .msg-row { display: flex; gap: 10px; max-width: 85%; align-items: flex-start; }
        .bubble { background: #182533; padding: 10px; border-radius: 15px; position: relative; }
        .msg-ava { width: 35px; height: 35px; border-radius: 50%; background: #2b5278; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 20px; }
        .video-circle { width: 200px; height: 200px; border-radius: 50%; object-fit: cover; border: 2px solid #5288c1; }
        
        /* Відповіді */
        .reply-preview { background: rgba(82, 136, 193, 0.1); border-left: 3px solid #5288c1; padding: 5px; margin-bottom: 5px; font-size: 11px; border-radius: 4px; color: #8fa1b3; }
        .comment-btn { background: none; border: none; color: #5288c1; font-size: 11px; font-weight: bold; cursor: pointer; padding: 5px 0; }

        /* Нижні кнопки (Центровані) */
        #bottom-nav { background: #17212b; padding: 15px; display: flex; justify-content: center; gap: 15px; border-top: 1px solid #2b5278; }
        .nav-btn { width: 150px; padding: 12px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.2s; }
        .nav-btn:active { transform: scale(0.95); }
        .btn-suggest { background: #5288c1; }
        .btn-feed { background: #2b5278; }

        /* Предложка */
        #suggest-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .suggest-card { background: #0e1621; padding: 20px; border-radius: 20px; width: 90%; max-width: 350px; border: 1px solid #2b5278; text-align: center; }
        textarea { width: 100%; height: 100px; background: #17212b; color: white; border: 1px solid #2b5278; border-radius: 10px; padding: 10px; margin-bottom: 10px; resize: none; outline: none; }
        
        /* Камера та прев'ю */
        #preview-container { display: none; position: fixed; bottom: 100px; right: 20px; z-index: 1000; }
        #v-preview { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #ef4444; }
        .icon-btn { background: none; border: none; cursor: pointer; color: #6c7883; font-size: 22px; }
    </style>
</head>
<body>

<div id="main-ui">
    <div id="top-bar">
        <b style="flex-grow:1">🤫 Недогарки LIVE</b>
        <button class="icon-btn" onclick="document.getElementById('m-pick').click()">🎵</button>
        <audio id="bg-audio" controls style="height:24px; width:120px;"></audio>
        <input type="file" id="m-pick" style="display:none" accept="audio/*" onchange="addMusic(event)">
    </div>

    <div id="preview-container"><video id="v-preview" autoplay muted playsinline></video></div>
    
    <div id="chat-box"></div>

    <div id="bottom-nav">
        <button class="nav-btn btn-suggest" onclick="showSuggest()">✍️ Предложка</button>
        <button class="nav-btn btn-feed" onclick="scrollToBottom()">📜 Стрічка</button>
    </div>
</div>

<div id="suggest-overlay">
    <div class="suggest-card">
        <h3 id="form-title">📢 Новий пост</h3>
        <div id="reply-info" style="display:none" class="reply-preview"></div>
        <textarea id="suggest-text" placeholder="Що сталось?"></textarea>
        
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <button class="nav-btn btn-feed" style="flex:1" onclick="document.getElementById('f-input').click()">📎 Фото</button>
            <button class="nav-btn btn-feed" style="flex:1" onclick="toggleRec()">📷 Кружечок</button>
        </div>

        <button class="nav-btn btn-suggest" style="width:100%" onclick="sendPost()">🚀 ОПУБЛІКУВАТИ</button>
        <button onclick="hideSuggest()" style="width:100%; background:none; border:none; color:gray; margin-top:10px; cursor:pointer;">Скасувати</button>
    </div>
</div>

<input type="file" id="f-input" style="display:none" accept="image/*" onchange="handleFile(event)">

<script>
    const socket = io();
    let mediaRecorder, chunks = [], currentStream, pendingFile = null, selectedReply = null;

    // Вхід без вікна
    window.onload = () => { socket.emit('register_or_login', {nick: "Анонім"}); };

    function showSuggest(reply = null) {
        selectedReply = reply;
        document.getElementById('suggest-overlay').style.display = 'flex';
        const info = document.getElementById('reply-info');
        if(reply) {
            info.style.display = 'block';
            info.innerText = `Відповідь: ${reply.text}`;
            document.getElementById('form-title').innerText = "💬 Відповідь";
        } else {
            info.style.display = 'none';
            document.getElementById('form-title').innerText = "📢 Новий пост";
        }
    }

    function hideSuggest() { document.getElementById('suggest-overlay').style.display = 'none'; selectedReply = null; }
    function scrollToBottom() { const b = document.getElementById('chat-box'); b.scrollTop = b.scrollHeight; }

    function handleFile(e) {
        const file = e.target.files[0]; if(!file) return;
        const r = new FileReader();
        r.onload = () => { pendingFile = r.result; alert("Фото готове до відправки!"); };
        r.readAsDataURL(file);
    }

    function sendPost() {
        const txt = document.getElementById('suggest-text').value;
        if(!txt.trim() && !pendingFile) return;

        socket.emit('message', {
            username: "Анонім",
            message: txt,
            file: pendingFile,
            type: pendingFile ? 'image' : 'text',
            reply: selectedReply
        });

        document.getElementById('suggest-text').value = "";
        pendingFile = null;
        hideSuggest();
    }

    function addMusic(e) {
        if(e.target.files[0]) {
            const a = document.getElementById('bg-audio');
            a.src = URL.createObjectURL(e.target.files[0]);
            a.play();
        }
    }

    async function toggleRec() {
        const pre = document.getElementById('preview-container'), v = document.getElementById('v-preview');
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                v.srcObject = currentStream; pre.style.display = 'block';
                mediaRecorder = new MediaRecorder(currentStream); chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const r = new FileReader();
                    r.onloadend = () => socket.emit('message', {username: "Анонім", file: r.result, type: 'circle', reply: selectedReply});
                    r.readAsDataURL(new Blob(chunks, {type: "video/webm"}));
                    currentStream.getTracks().forEach(t => t.stop());
                    pre.style.display = 'none'; hideSuggest();
                };
                mediaRecorder.start();
            } catch(e) { alert("Доступ до камери заборонено!"); }
        } else { mediaRecorder.stop(); }
    }

    socket.on('message', d => {
        const box = document.getElementById('chat-box'), row = document.createElement('div');
        row.className = "msg-row";
        
        let rH = d.reply ? `<div class="reply-preview"><b>Відповідь на:</b><br>${d.reply.text}</div>` : "";
        let h = "";
        if(d.type === 'text') h = `<div>${d.message}</div>`;
        else if(d.type === 'image') h = `<img src="${d.file}" style="max-width:100%; border-radius:10px;">`;
        else if(d.type === 'circle') h = `<video src="${d.file}" class="video-circle" autoplay loop muted playsinline onclick="this.muted=!this.muted"></video>`;
        
        row.innerHTML = `
            <div class="msg-ava">☁️</div>
            <div class="bubble">
                ${rH}
                <b style="color:#5288c1; font-size:12px;">Анонім</b><br>
                ${h}
                <button class="comment-btn" onclick="showSuggest({text:'${d.message || 'Медіа'}'})">💬 Відповісти</button>
                <small style="display:block; text-align:right; color:gray; font-size:9px; margin-top:2px;">${d.time || ''}</small>
            </div>`;
        box.appendChild(row);
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
