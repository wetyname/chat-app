<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chat v.beta.1.8</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #top-bar { background: #1e293b; padding: 10px; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 8px; }
        #bg-audio { flex-grow: 1; height: 32px; }
        .btn { background: #334155; color: #facc15; border: 1px solid #475569; padding: 8px 10px; border-radius: 6px; cursor: pointer; }
        .user-ava { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 2px solid #2563eb; }
        #playlist-ui { display: none; background: #1e293b; max-height: 100px; overflow-y: auto; padding: 10px; border-bottom: 1px solid #334155; font-size: 12px; }
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .msg-row { display: flex; gap: 10px; max-width: 85%; align-items: flex-end; }
        .my-row { align-self: flex-end; flex-direction: row-reverse; }
        .msg-img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .bubble { background: #334155; padding: 10px; border-radius: 12px; }
        .my-row .bubble { background: #1e40af; }
        .chat-image { max-width: 200px; border-radius: 10px; }
        .video-circle { width: 200px; height: 200px; border-radius: 50%; object-fit: cover; border: 2px solid #2563eb; }
        #login-form { position: fixed; inset: 0; background: #1e293b; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 12px; padding: 20px; }
        .in-field { width: 100%; max-width: 300px; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; outline: none; }
        #media-menu { display:none; position:absolute; bottom:60px; left:10px; background:#334155; border-radius:8px; padding:5px; flex-direction:column; gap:5px; z-index:100; }
    </style>
</head>
<body>

    <div id="login-form">
        <h2>Вхід</h2>
        <input type="text" id="u-nick" class="in-field" placeholder="Нікнейм">
        <input type="password" id="u-pass" class="in-field" placeholder="Пароль">
        <input type="email" id="u-email" class="in-field" placeholder="Пошта">
        <button class="in-field" style="background:#2563eb;" onclick="auth()">Увійти</button>
    </div>

    <div id="chat-area" style="display:none; flex-direction:column; height:100%;">
        <div id="top-bar">
            <img id="my-head-ava" class="user-ava" onclick="document.getElementById('ava-pick').click()">
            <input type="file" id="ava-pick" style="display:none" onchange="updateAva(event)">
            <button class="btn" onclick="document.getElementById('music-pick').click()">+ 🎵</button>
            <button class="btn" onclick="togglePlaylist()">⌵</button>
            <audio id="bg-audio" controls></audio>
        </div>
        <div id="playlist-ui"></div>
        <div id="chat-box"></div>
        
        <div style="padding:10px; display:flex; gap:8px; background:#1e293b; position:relative;">
            <button class="btn" onclick="toggleMenu()">📎</button>
            <button class="btn" style="border-radius:50%" onclick="document.getElementById('c-pick').click()">◯</button>
            <div id="media-menu">
                <button class="btn" onclick="document.getElementById('p-pick').click()">🖼 Фото</button>
                <button class="btn" onclick="document.getElementById('v-pick').click()">🎥 Відео</button>
            </div>
            <input type="file" id="p-pick" style="display:none" accept="image/*" onchange="hMedia(event, 'image')">
            <input type="file" id="v-pick" style="display:none" accept="video/*" onchange="hMedia(event, 'video')">
            <input type="file" id="c-pick" style="display:none" accept="video/*" onchange="hMedia(event, 'circle')">
            <input type="text" id="msg-input" class="in-field" style="flex-grow:1;" onkeypress="if(event.key==='Enter')sendT()">
            <button onclick="sendT()" style="background:#2563eb; color:white; border:none; width:50px; border-radius:8px;">➤</button>
        </div>
    </div>

    <script>
        var socket = io(), myNick = "", myReal = "", myAva = "", playlist = [], curI = 0;
        function auth() {
            let n = document.getElementById('u-nick').value, p = document.getElementById('u-pass').value, e = document.getElementById('u-email').value;
            if(n && p) socket.emit('register_or_login', {nick: n, pass: p, email: e});
        }
        socket.on('auth_success', d => {
            myNick = d.nick; myReal = d.real_nick; myAva = d.avatar;
            document.getElementById('my-head-ava').src = myAva;
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('chat-area').style.display = 'flex';
        });
        function toggleMenu() { let m = document.getElementById('media-menu'); m.style.display = m.style.display==='flex'?'none':'flex'; }
        function hMedia(e, mode) {
            document.getElementById('media-menu').style.display = 'none';
            let file = e.target.files[0]; if(!file) return;
            if(mode !== 'image') {
                let v = document.createElement('video'); v.preload = 'metadata';
                v.onloadedmetadata = () => { if(v.duration > 61) alert("Макс 1 хв!"); else up(file, mode); };
                v.src = URL.createObjectURL(file);
            } else up(file, mode);
        }
        function up(file, mode) {
            let r = new FileReader(); r.onload = (e) => socket.emit('send_media', {username: myNick, real_nick: myReal, avatar: myAva, file: e.target.result, type: mode});
            r.readAsDataURL(file);
        }
        function sendT() {
            let i = document.getElementById('msg-input'), txt = i.value.trim();
            if(!txt) return; socket.emit('message', {username: myNick, real_nick: myReal, message: txt, avatar: myAva, msg_id: "m-"+Date.now()});
            i.value = "";
        }
        socket.on('message', d => {
            let b = document.getElementById('chat-box'), row = document.createElement('div'), isMy = d.real_nick === myReal;
            row.className = "msg-row" + (isMy ? " my-row" : "");
            let con = `<b>${d.username}</b><br>`;
            if(d.type==='image') con += `<img src="${d.url}" class="chat-image">`;
            else if(d.type==='video') con += `<video src="${d.url}" class="chat-image" controls></video>`;
            else if(d.type==='circle') con += `<video src="${d.url}" class="video-circle" autoplay muted loop></video>`;
            else con += d.message;
            row.innerHTML = `<img class="msg-img" src="${d.avatar}"><div class="bubble">${con}</div>`;
            b.appendChild(row); b.scrollTop = b.scrollHeight;
        });
        function togglePlaylist() { let u = document.getElementById('playlist-ui'); u.style.display = u.style.display==='block'?'none':'block'; }
        document.getElementById('music-pick').onchange = (e) => { if(e.target.files[0]) { playlist.push(e.target.files[0]); updateP(); if(playlist.length===1) playP(0); }};
        function updateP() { document.getElementById('playlist-ui').innerHTML = playlist.map((f, i) => `<div>#${i+1} ${f.name}</div>`).join(''); }
        function playP(i) { curI=i; let p=document.getElementById('bg-audio'); p.src=URL.createObjectURL(playlist[i]); p.play(); p.onended=()=>playP(i+1); }
    </script>
</body>
</html>
