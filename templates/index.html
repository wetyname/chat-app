<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приватний Чат</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Панель музики */
        #music-panel { background: #1e293b; padding: 10px; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 10px; z-index: 10; }
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { 
            display: none; position: absolute; background-color: #1e293b; min-width: 220px; 
            box-shadow: 0px 8px 16px rgba(0,0,0,0.5); z-index: 100; border: 1px solid #475569; border-radius: 8px; margin-top: 5px;
        }
        .dropdown-content button, .dropdown-content label { 
            color: #facc15; padding: 12px 16px; display: block; background: none; border: none; 
            width: 100%; text-align: left; cursor: pointer; font-size: 14px;
        }
        .dropdown-content button:hover, .dropdown-content label:hover { background-color: #334155; }
        .show { display: block; }

        .music-btn { background: #334155; color: #facc15; border: 1px solid #475569; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #file-input { display: none; }

        /* Чат */
        #login-form { position: fixed; inset: 0; background: #1e293b; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; padding: 20px; }
        .in-field { width: 100%; max-width: 320px; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; outline: none; }
        #chat-area { display: none; flex-direction: column; height: 100%; }
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #334155; padding: 10px; border-radius: 12px; align-self: flex-start; max-width: 80%; }
        #online { text-align: center; padding: 5px; color: #facc15; font-size: 0.8em; background: #1e293b; }
    </style>
</head>
<body onclick="enableAudio()">

    <audio id="drop-sound" src="https://www.soundjay.com/buttons/sounds/button-20.mp3" preload="auto"></audio>
    <audio id="bg-audio" loop></audio>

    <div id="login-form">
        <h2>Вхід у чат</h2>
        <input type="text" id="u-nick" class="in-field" placeholder="Нікнейм">
        <input type="password" id="u-pass" class="in-field" placeholder="Пароль">
        <button class="in-field btn" style="background:#2563eb; color:white; border:none; font-weight:bold; cursor:pointer;" onclick="auth()">Увійти</button>
    </div>

    <div id="chat-area">
        <div id="music-panel">
            <div class="dropdown">
                <button onclick="togglePlaylist()" class="music-btn">🎵 Плейліст</button>
                <div id="playlistMenu" class="dropdown-content">
                    <button onclick="playMusic('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3', '🕺 Гоп! Ца-Ца!')">🕺 Гоп! Ца-Ца!</button>
                    <button onclick="playMusic('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3', '🥂 Ой, хто п\'є...')">🥂 Ой, хто п'є...</button>
                    <button onclick="playMusic('https://upload.wikimedia.org/wikipedia/commons/b/b3/Ty_zh_mene_pidmanula.ogg', '💃 Підманула')">💃 Підманула</button>
                    <hr style="border: 0.5px solid #475569; margin: 0;">
                    <label for="file-input">➕ Своя пісня з телефона</label>
                </div>
            </div>
            <input type="file" id="file-input" accept="audio/*">
            <button class="music-btn" onclick="stopMusic()" style="color:#ef4444;">⏸</button>
            <span id="song-name" style="color: #94a3b8; font-size: 0.7em; margin-left: 5px;">тиша</span>
        </div>

        <div id="online">В мережі: 0</div>
        <div id="chat-box"></div>
        
        <div style="padding:10px; display:flex; gap:10px; background:#1e293b;">
            <input type="text" id="m-text" class="in-field" style="flex-grow:1;" placeholder="Повідомлення..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" style="background:#2563eb; color:white; border:none; width:50px; border-radius:8px; cursor:pointer;">></button>
        </div>
    </div>

    <script>
        var socket = io();
        var myID = "", realNick = "";
        var audioEnabled = false;

        function enableAudio() {
            if (!audioEnabled) {
                const drop = document.getElementById('drop-sound');
                drop.play().then(() => { drop.pause(); audioEnabled = true; }).catch(() => {});
            }
        }

        function togglePlaylist() {
            document.getElementById("playlistMenu").classList.toggle("show");
        }

        function playMusic(url, name) {
            enableAudio();
            const player = document.getElementById('bg-audio');
            document.getElementById('song-name').innerText = "Завантаження...";
            
            player.src = url;
            player.load();
            player.play()
                .then(() => { document.getElementById('song-name').innerText = name; })
                .catch(() => { document.getElementById('song-name').innerText = "Помилка (спробуйте свою пісню)"; });
        }

        function stopMusic() {
            document.getElementById('bg-audio').pause();
            document.getElementById('song-name').innerText = "тиша";
        }

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) playMusic(URL.createObjectURL(file), file.name);
        });

        function auth() {
            enableAudio();
            let n = document.getElementById('u-nick').value.trim();
            let p = document.getElementById('u-pass').value;
            if (n && p) socket.emit('register_or_login', {nick: n, pass: p});
        }

        socket.on('auth_success', data => {
            myID = data.nick; realNick = data.real_nick;
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('chat-area').style.display = 'flex';
        });

        socket.on('update_online', d => {
            document.getElementById('online').innerText = "В мережі: " + d.count;
        });

        function send() {
            enableAudio();
            let t = document.getElementById('m-text'), txt = t.value.trim();
            if(!txt) return;
            socket.emit('message', {username: myID, message: txt});
            t.value = "";
        }

        socket.on('message', d => {
            let b = document.getElementById('chat-box');
            if (d.username !== myID) document.getElementById('drop-sound').play().catch(()=>{});
            let div = document.createElement('div');
            div.className = "msg";
            div.innerHTML = `<b>${d.username}:</b> ${d.message}`;
            b.appendChild(div);
            b.scrollTop = b.scrollHeight;
        });

        window.onclick = function(e) {
            if (!e.target.matches('.music-btn')) {
                document.getElementById("playlistMenu").classList.remove('show');
            }
        }
    </script>
</body>
</html>
