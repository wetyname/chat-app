<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Подслушано Недогарки</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #0e1621; color: white; font-family: sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Екран вибору */
        #login-overlay { position: fixed; inset: 0; background: #17212b; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #0e1621; padding: 25px; border-radius: 15px; display: flex; flex-direction: column; gap: 15px; width: 90%; max-width: 320px; text-align: center; }
        .login-card button { padding: 15px; background: #2b5278; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-suggest { background: #5288c1 !important; }
        
        /* Поле для тексту в предложці */
        #suggest-text { width: 100%; height: 120px; background: #17212b; color: white; border: 1px solid #2b5278; border-radius: 8px; padding: 10px; resize: none; outline: none; }

        /* Основний інтерфейс чату */
        #main-ui { display: none; flex-direction: column; height: 100%; }
        #top-bar { background: #17212b; padding: 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #2b5278; }
        #online-counter { color: #5288c1; font-weight: bold; font-size: 12px; }
        
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-row { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; }
        .my-row { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { background: #182533; padding: 8px 12px; border-radius: 15px; position: relative; word-wrap: break-word; min-width: 60px; }
        .my-row .bubble { background: #2b5278; }
        .msg-img-ava { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: #2b5278; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .msg-time { font-size: 9px; color: #8fa1b3; margin-top: 4px; display: block; text-align: right; }
        
        #input-area { background: #17212b; padding: 10px 10px calc(15px + env(safe-area-inset-bottom)) 10px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #2b5278; }
        .in-field { flex-grow: 1; background: none; border: none; color: white; outline: none; font-size: 16px; }
        .icon-btn { background: none; border: none; cursor: pointer; color: #6c7883; font-size: 22px; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card" id="auth-choice">
        <h2 style="margin:0;">🤫 Подслушано</h2>
        <p style="color:#8fa1b3; font-size:12px;">Недогарки</p>
        <button class="btn-suggest" onclick="showSuggest()">📝 Написати в предложку</button>
        <button onclick="enterChat()">👀 Дивитися чат</button>
    </div>

    <div class="login-card" id="suggest-screen" style="display:none;">
        <h3>Нова плітка</h3>
        <textarea id="suggest-text" placeholder="Що сталось цікавого?"></textarea>
        <button class="btn-suggest" onclick="sendSuggest()">🚀 ВІДПРАВИТИ АНОНІМНО</button>
        <button onclick="showChoice()" style="background:none; color:#8fa1b3;">← Назад</button>
    </div>
</div>

<div id="main-ui">
    <div id="top-bar">
        <div id="online-counter">Online: <span id="user-count">0</span></div>
        <div style="flex-grow:1; text-align:center; font-weight:bold; font-size:14px;">Стрічка</div>
        <button class="icon-btn" onclick="location.reload()">🔄</button>
    </div>

    <div id="chat-box"></div>

    <div id="input-area">
        <input type="text" id="msg-input" class="in-field" placeholder="Написати в чат..." onkeypress="if(event.key==='Enter')sendTxt()">
        <button class="icon-btn" style="color:#5288c1" onclick="sendTxt()">➤</button>
    </div>
</div>

<script>
    const socket = io({ transports: ['websocket'] });
    let myNick = "Глядач", myReal = "viewer", myAva = "👤";

    function showSuggest() {
        document.getElementById('auth-choice').style.display = 'none';
        document.getElementById('suggest-screen').style.display = 'flex';
    }

    function showChoice() {
        document.getElementById('auth-choice').style.display = 'flex';
        document.getElementById('suggest-screen').style.display = 'none';
    }

    function enterChat() {
        socket.emit('register_or_login', {nick: "Глядач"});
    }

    socket.on('auth_success', d => {
        myNick = d.nick; myReal = d.real_nick; myAva = d.avatar;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-ui').style.display = 'flex';
    });

    function sendSuggest() {
        const txt = document.getElementById('suggest-text').value;
        if(!txt.trim()) return;
        
        socket.emit('message', {
            username: "Анонім",
            real_nick: "anon_cloud",
            message: txt,
            type: 'text'
        });
        
        alert("Надіслано до стрічки!");
        document.getElementById('suggest-text').value = "";
        enterChat();
    }

    function sendTxt() {
        const i = document.getElementById('msg-input');
        if(!i.value.trim()) return;
        socket.emit('message', {username: myNick, real_nick: myReal, avatar: myAva, message: i.value, type: 'text'});
        i.value = "";
    }

    socket.on('update_online', d => document.getElementById('user-count').innerText = d.count);

    socket.on('message', d => {
        const box = document.getElementById('chat-box'), row = document.createElement('div');
        row.className = "msg-row " + (d.real_nick === myReal ? "my-row" : "");
        
        // Визначаємо аватарку: якщо анонім - хмарка, якщо ні - іконка або фото
        let avaDisplay = d.real_nick === "anon_cloud" ? "☁️" : (d.avatar.length < 5 ? d.avatar : `<img src="${d.avatar}" class="msg-img-ava">`);
        let avaHtml = `<div class="msg-img-ava">${avaDisplay}</div>`;
        
        row.innerHTML = `${avaHtml}<div class="bubble"><b>${d.username}</b><br>${d.message}<span class="msg-time">${d.time || ''}</span></div>`;
        box.appendChild(row);
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
