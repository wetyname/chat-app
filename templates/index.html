<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Avatars</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        /* Аватарка у профілі */
        #profile-setup { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .avatar-container { position: relative; width: 60px; height: 60px; }
        .avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; background: #334155; border: 2px solid #2563eb; }
        .plus-btn { position: absolute; bottom: 0; right: 0; background: #2563eb; border: none; color: white; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 14px; line-height: 20px; text-align: center; }

        #login-form { position: fixed; inset: 0; background: #1e293b; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; }
        .in-field { width: 300px; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; }
        
        #chat-area { display: none; flex-direction: column; height: 100%; }
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Повідомлення з аватаркою */
        .msg-wrapper { display: flex; gap: 10px; align-items: flex-start; max-width: 85%; }
        .my-wrapper { align-self: flex-end; flex-direction: row-reverse; }
        .msg-ava { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .msg-content { background: #334155; padding: 10px; border-radius: 12px; position: relative; }
        .my-msg .msg-content { background: #1e40af; }
        .sys-msg { align-self: center; background: #450a0a !important; border: 1px solid #ef4444; }

        .del-btn { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 0.8em; margin-left: 5px; }
    </style>
</head>
<body>

<div id="login-form">
    <h2>Налаштування профілю</h2>
    <div id="profile-setup">
        <div class="avatar-container">
            <img id="my-ava-preview" class="avatar-img" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
            <button class="plus-btn" onclick="document.getElementById('ava-input').click()">+</button>
        </div>
        <input type="file" id="ava-input" accept="image/*" style="display:none" onchange="previewAva(event)">
    </div>
    <input type="text" id="u-nick" class="in-field" placeholder="Нікнейм">
    <input type="password" id="u-pass" class="in-field" placeholder="Пароль">
    <input type="email" id="u-email" class="in-field" placeholder="Пошта">
    <button onclick="auth()" class="in-field" style="background: #2563eb; cursor: pointer;">Увійти</button>
    <p id="err" style="color: #ef4444;"></p>
</div>

<div id="chat-area">
    <div id="chat-box"></div>
    <div style="padding: 10px; display: flex; gap: 5px; background: #1e293b;">
        <input type="text" id="m-text" class="in-field" style="flex-grow: 1;" placeholder="Повідомлення..." onkeypress="if(event.key==='Enter')send()">
        <button onclick="send()" style="width: 50px; border-radius: 8px;">></button>
    </div>
</div>

<script>
    var socket = io();
    var myNick = "";
    var myAvatarData = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

    function previewAva(e) {
        let file = e.target.files[0];
        if(file) {
            let reader = new FileReader();
            reader.onload = function(event) {
                myAvatarData = event.target.result;
                document.getElementById('my-ava-preview').src = myAvatarData;
            };
            reader.readAsDataURL(file);
        }
    }

    function auth() {
        let n = document.getElementById('u-nick').value;
        let p = document.getElementById('u-pass').value;
        let e = document.getElementById('u-email').value;
        socket.emit('register_or_login', {nick: n, pass: p, email: e});
    }

    socket.on('auth_success', d => {
        myNick = d.nick;
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('chat-area').style.display = 'flex';
    });

    socket.on('auth_error', d => document.getElementById('err').innerText = d.msg);

    function send() {
        let t = document.getElementById('m-text'), txt = t.value.trim();
        if(!txt) return;
        let id = "m" + Date.now();
        socket.emit('message', {
            username: myNick, 
            real_nick: myNick, 
            message: txt, 
            msg_id: id,
            avatar: myAvatarData
        });
        t.value = "";
    }

    socket.on('message', d => {
        let b = document.getElementById('chat-box');
        let isMy = d.username === myNick;
        let isSys = d.is_system;

        let wrapper = document.createElement('div');
        wrapper.className = "msg-wrapper" + (isMy ? " my-wrapper" : "") + (isSys ? " sys-msg" : "");
        wrapper.id = d.msg_id;

        let ava = `<img class="msg-ava" src="${d.avatar || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}">`;
        let btn = (isMy && !isSys) ? `<button class="del-btn" onclick="reqDel('${d.msg_id}')">✖</button>` : "";
        
        wrapper.innerHTML = `
            ${ava}
            <div class="msg-content">
                <b>${d.username}</b><br>${d.message} ${btn}
            </div>
        `;
        
        b.appendChild(wrapper);
        b.scrollTop = b.scrollHeight;
    });

    function reqDel(id) { socket.emit('delete_message', {msg_id: id}); }
    socket.on('remove_msg', d => {
        let el = document.getElementById(d.msg_id);
        if(el) el.remove();
    });
</script>
</body>
</html>
