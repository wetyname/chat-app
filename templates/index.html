<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Подслушано Недогарки</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #0e1621; color: white; font-family: sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        #main-ui { display: flex; flex-direction: column; height: 100%; position: relative; }
        
        /* Шапка */
        #top-bar { background: #17212b; padding: 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #2b5278; z-index: 10; }
        
        /* Стрічка повідомлень */
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        
        /* Повідомлення */
        .msg-row { display: flex; gap: 10px; max-width: 85%; align-items: flex-start; }
        .bubble { background: #182533; padding: 10px; border-radius: 15px; position: relative; }
        .msg-ava { width: 35px; height: 35px; border-radius: 50%; background: #2b5278; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 20px; }
        .video-circle { width: 200px; height: 200px; border-radius: 50%; object-fit: cover; border: 2px solid #5288c1; }
        
        /* КНОПКИ ПО САМОМУ ЦЕНТРУ (X-0, Y-0) */
        #center-nav { 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); /* Точне центрування */
            display: flex; 
            flex-direction: column; /* Кнопки одна під одною (можна змінити на row) */
            gap: 20px; 
            z-index: 100; /* Поверх стрічки */
            pointer-events: none; /* Щоб не заважало гортати стрічку КРІМ кнопок */
        }
        
        .nav-btn { 
            width: 180px; 
            padding: 15px; 
            border-radius: 15px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            color: white; 
            transition: 0.2s; 
            pointer-events: auto; /* Повертаємо кліки кнопкам */
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .nav-btn:active { transform: scale(0.9); }
        .btn-suggest { background: #5288c1; }
        .btn-feed { background: #2b5278; }

        /* Оверлей для предложки */
        #suggest-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .suggest-card { background: #0e1621; padding: 20px; border-radius: 20px; width: 90%; max-width: 350px; border: 1px solid #2b5278; text-align: center; }
        textarea { width: 100%; height: 100px; background: #17212b; color: white; border: 1px solid #2b5278; border-radius: 10px; padding: 10px; margin-bottom: 10px; resize: none; outline: none; }
        
        #preview-container { display: none; position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
        #v-preview { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #ef4444; }
        .icon-btn { background: none; border: none; cursor: pointer; color: #6c7883; font-size: 22px; }
    </style>
</head>
<body>

<div id="main-ui">
    <div id="top-bar">
        <b style="flex-grow:1">🤫 Недогарки LIVE</b>
        <button class="icon-btn" onclick="document.getElementById('m-pick').click()">🎵</button>
        <audio id="bg-audio" controls style="height:24px; width:120px;"></audio>
        <input type="file" id="m-pick" style="display:none" accept="audio/*" onchange="addMusic(event)">
    </div>

    <div id="center-nav">
        <button class="nav-btn btn-suggest" onclick="showSuggest()">✍️ Предложка</button>
        <button class="nav-btn btn-feed" onclick="hideButtons()">📜 Дивитись стрічку</button>
    </div>

    <div id="preview-container"><video id="v-preview" autoplay muted playsinline></video></div>
    
    <div id="chat-box"></div>
</div>

<div id="suggest-overlay">
    <div class="suggest-card">
        <h3>📢 Новий пост</h3>
        <textarea id="suggest-text" placeholder="Що сталось?"></textarea>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <button class="nav-btn btn-feed" style="flex:1; width:auto;" onclick="document.getElementById('f-input').click()">📎 Фото</button>
            <button class="nav-btn btn-feed" style="flex:1; width:auto;" onclick="toggleRec()">📷 Кружечок</button>
        </div>
        <button class="nav-btn btn-suggest" style="width:100%" onclick="sendPost()">🚀 ОПУБЛІКУВАТИ</button>
        <button onclick="hideSuggest()" style="width:100%; background:none; border:none; color:gray; margin-top:10px; cursor:pointer;">Скасувати</button>
    </div>
</div>

<input type="file" id="f-input" style="display:none" accept="image/*" onchange="handleFile(event)">

<script>
    const socket = io();
    let mediaRecorder, chunks = [], currentStream, pendingFile = null;

    window.onload = () => { socket.emit('register_or_login', {nick: "Анонім"}); };

    // Функція для закриття кнопок, щоб бачити стрічку
    function hideButtons() {
        document.getElementById('center-nav').style.display = 'none';
    }

    // Показуємо кнопки знову, якщо треба (можна додати виклик десь у меню)
    function showButtons() {
        document.getElementById('center-nav').style.display = 'flex';
    }

    function showSuggest() { document.getElementById('suggest-overlay').style.display = 'flex'; }
    function hideSuggest() { document.getElementById('suggest-overlay').style.display = 'none'; }

    function handleFile(e) {
        const file = e.target.files[0]; if(!file) return;
        const r = new FileReader();
        r.onload = () => { pendingFile = r.result; alert("Готово!"); };
        r.readAsDataURL(file);
    }

    function sendPost() {
        const txt = document.getElementById('suggest-text').value;
        if(!txt.trim() && !pendingFile) return;
        socket.emit('message', { username: "Анонім", message: txt, file: pendingFile, type: pendingFile ? 'image' : 'text' });
        document.getElementById('suggest-text').value = "";
        pendingFile = null;
        hideSuggest();
        hideButtons(); // Закриваємо кнопки після посту
    }

    function addMusic(e) {
        if(e.target.files[0]) {
            const a = document.getElementById('bg-audio');
            a.src = URL.createObjectURL(e.target.files[0]);
            a.play();
        }
    }

    async function toggleRec() {
        const pre = document.getElementById('preview-container'), v = document.getElementById('v-preview');
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                v.srcObject = currentStream; pre.style.display = 'block';
                mediaRecorder = new MediaRecorder(currentStream); chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const r = new FileReader();
                    r.onloadend = () => socket.emit('message', {username: "Анонім", file: r.result, type: 'circle'});
                    r.readAsDataURL(new Blob(chunks, {type: "video/webm"}));
                    currentStream.getTracks().forEach(t => t.stop());
                    pre.style.display = 'none'; hideSuggest(); hideButtons();
                };
                mediaRecorder.start();
            } catch(e) { alert("Камера недоступна!"); }
        } else { mediaRecorder.stop(); }
    }

    socket.on('message', d => {
        const box = document.getElementById('chat-box'), row = document.createElement('div');
        row.className = "msg-row";
        let h = "";
        if(d.type === 'text') h = `<div>${d.message}</div>`;
        else if(d.type === 'image') h = `<img src="${d.file}" style="max-width:100%; border-radius:10px;">`;
        else if(d.type === 'circle') h = `<video src="${d.file}" class="video-circle" autoplay loop muted playsinline></video>`;
        
        row.innerHTML = `<div class="msg-ava">☁️</div><div class="bubble"><b>Анонім</b><br>${h}<small style="display:block; text-align:right; color:gray; font-size:9px;">${d.time || ''}</small></div>`;
        box.appendChild(row);
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
