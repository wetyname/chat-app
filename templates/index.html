<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #login-form { position: fixed; inset: 0; background: #1e293b; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; }
        #chat-area { display: none; flex-direction: column; height: 100%; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; width: 280px; }
        .btn { padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; width: 280px; }
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        #email-field { display: none; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>
    <div id="login-form">
        <h2>Вхід</h2>
        <input type="text" id="u-nick" placeholder="Нікнейм">
        <div id="email-field">
            <input type="email" id="u-email" placeholder="Твій Email для реєстрації">
        </div>
        <input type="password" id="u-pass" placeholder="Пароль">
        <button class="btn" onclick="auth()">Увійти</button>
    </div>

    <div id="chat-area">
        <div id="online" style="text-align:center; padding:5px; color:#facc15;">В мережі: 0</div>
        <div id="chat-box"></div>
        <div style="padding:10px; display:flex; gap:5px; background:#1e293b;">
            <input type="text" id="m-text" style="flex-grow:1;">
            <button onclick="send()" class="btn" style="width:50px;">></button>
        </div>
    </div>

    <script>
        var socket = io();
        var myID = "";

        function auth() {
            let n = document.getElementById('u-nick').value;
            let p = document.getElementById('u-pass').value;
            let e = document.getElementById('u-email').value;
            socket.emit('register_or_login', {nick: n, pass: p, email: e});
        }

        socket.on('need_email', () => {
            alert("Ви новий користувач! Будь ласка, введіть пошту.");
            document.getElementById('email-field').style.display = 'flex';
        });

        socket.on('verify_needed', data => {
            let code = prompt("Введіть код з пошти:");
            if(code) socket.emit('submit_code', {nick: data.nick, code: code});
        });

        socket.on('auth_success', data => {
            myID = data.nick === "adminkgv2015" ? "Костя Гончаров" : data.nick;
            alert("ПРАВИЛА: Не матюкатись!");
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('chat-area').style.display = 'flex';
        });

        socket.on('auth_error', d => alert(d.msg));
        socket.on('update_online', d => document.getElementById('online').innerText = "В мережі: " + d.count);
        
        function send() {
            let t = document.getElementById('m-text');
            if(t.value) { socket.emit('message', {username: myID, message: t.value}); t.value = ""; }
        }

        socket.on('message', d => {
            let b = document.getElementById('chat-box');
            b.innerHTML += `<div><b>${d.username}:</b> ${d.message}</div>`;
            b.scrollTop = b.scrollHeight;
        });
    </script>
</body>
</html>
