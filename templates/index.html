<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Подслушано Недогарки</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #0e1621; color: white; font-family: sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Екран предложки (єдиний спосіб писати) */
        #login-overlay { position: fixed; inset: 0; background: #17212b; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #0e1621; padding: 25px; border-radius: 15px; display: flex; flex-direction: column; gap: 15px; width: 90%; max-width: 320px; border: 1px solid #2b5278; }
        .login-card button { padding: 12px; background: #2b5278; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        #main-ui { display: none; flex-direction: column; height: 100%; }
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Повідомлення */
        .msg-row { display: flex; gap: 10px; align-items: flex-end; cursor: pointer; }
        .bubble { background: #182533; padding: 10px; border-radius: 12px; position: relative; max-width: 85%; }
        .reply-box { background: rgba(255,255,255,0.05); border-left: 3px solid #5288c1; padding: 5px 8px; margin-bottom: 5px; font-size: 12px; border-radius: 4px; color: #8fa1b3; }
        
        /* Нижня панель */
        #bottom-bar { background: #17212b; padding: 10px; text-align: center; border-top: 1px solid #2b5278; }
        #reply-indicator { display: none; background: #17212b; padding: 8px 15px; border-top: 1px solid #2b5278; font-size: 12px; color: #5288c1; justify-content: space-between; }
        
        .media-content { max-width: 100%; border-radius: 8px; margin-top: 5px; }
        .msg-img-ava { width: 35px; height: 35px; border-radius: 50%; background: #2b5278; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card" id="suggest-screen">
        <h3 style="text-align:center;">🤫 Запропонувати новину</h3>
        <div id="reply-to-info" style="display:none; font-size:11px; color:#5288c1; margin-bottom:5px;">Відповідь на пост...</div>
        <textarea id="suggest-text" placeholder="Твій текст..." style="width:100%; height:80px; background:#17212b; color:white; border:1px solid #2b5278; border-radius:8px; padding:10px;"></textarea>
        <input type="file" id="suggest-file" hidden accept="image/*,video/*">
        <button onclick="document.getElementById('suggest-file').click()" style="background:#3e546a;">📎 Фото/Відео</button>
        <button onclick="sendSuggest()" style="background:#5288c1;">🚀 ОПУБЛІКУВАТИ</button>
        <button onclick="closeSuggest()" id="cancel-btn" style="background:none; color:gray;">Просто дивитися</button>
    </div>
</div>

<div id="main-ui">
    <div style="background:#17212b; padding:10px; text-align:center; border-bottom:1px solid #2b5278;"><b>Подслушано Недогарки</b></div>
    <div id="chat-box"></div>
    <div id="bottom-bar">
        <button onclick="openSuggest(null)" style="background:#5288c1; color:white; border:none; padding:10px 20px; border-radius:20px; font-weight:bold; cursor:pointer;">✍️ Написати в предложку</button>
    </div>
</div>

<script>
    const socket = io();
    let selectedReply = null;

    function openSuggest(replyData) {
        selectedReply = replyData;
        document.getElementById('login-overlay').style.display = 'flex';
        document.getElementById('reply-to-info').style.display = replyData ? 'block' : 'none';
        document.getElementById('cancel-btn').style.display = 'block';
    }

    function closeSuggest() {
        document.getElementById('login-overlay').style.display = 'none';
    }

    function sendSuggest() {
        const txt = document.getElementById('suggest-text').value;
        const file = document.getElementById('suggest-file').files[0];
        if (!txt.trim() && !file) return;

        const sendData = (fileData = null, fType = null) => {
            socket.emit('message', {
                username: "Анонім",
                message: txt,
                file: fileData,
                fileType: fType,
                reply: selectedReply
            });
            document.getElementById('suggest-text').value = "";
            document.getElementById('suggest-file').value = "";
            closeSuggest();
            document.getElementById('main-ui').style.display = 'flex';
        };

        if (file) {
            const r = new FileReader();
            r.onload = () => sendData(r.result, file.type.split('/')[0]);
            r.readAsDataURL(file);
        } else {
            sendData();
        }
    }

    socket.on('message', d => {
        const box = document.getElementById('chat-box');
        const row = document.createElement('div');
        row.className = "msg-row";
        row.onclick = () => openSuggest({text: d.message || "Медіа", author: d.username});

        let replyHtml = d.reply ? `<div class="reply-box"><b>${d.reply.author}</b><br>${d.reply.text}</div>` : "";
        let mediaHtml = d.file ? (d.fileType === 'image' ? `<img src="${d.file}" class="media-content">` : `<video src="${d.file}" class="media-content" controls></video>`) : "";

        row.innerHTML = `<div class="msg-img-ava">☁️</div>
            <div class="bubble">
                ${replyHtml}
                <b style="color:#5288c1; font-size:12px;">${d.username}</b><br>
                ${d.message ? `<span>${d.message}</span>` : ""}
                ${mediaHtml}
                <div style="text-align:right; font-size:9px; color:gray; margin-top:4px;">${d.time}</div>
            </div>`;
        box.appendChild(row);
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
