<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Приватний Чат</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a2a6c; color: white; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        #login-form { background: #2a3a7c; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; width: 320px; border: 1px solid #3a4a8c; }
        #chat-area { display: none; width: 100%; max-width: 900px; }
        #chat-box { width: 500px; height: 500px; border: 1px solid #3a4a8c; background: #0f172a; overflow-y: scroll; padding: 15px; border-radius: 12px; margin: 0 auto; }
        #input-area { display: flex; gap: 10px; margin-top: 15px; justify-content: center; }
        input { padding: 12px; border: 1px solid #3a4a8c; border-radius: 8px; background: #1e293b; color: white; outline: none; margin-bottom: 10px; width: 90%; }
        button { padding: 10px 20px; background: #2563eb; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

    <div id="login-form">
        <h2 id="login-title">Реєстрація</h2>
        <input type="text" id="user-nick" placeholder="Ваш нікнейм">
        <input type="email" id="user-email" placeholder="Електронна пошта">
        <input type="password" id="user-pass" placeholder="Пароль">
        <button onclick="startChat()">Увійти</button>
    </div>

    <div id="chat-area">
        <div id="chat-box"></div>
        <div id="input-area">
            <input type="text" id="message" placeholder="Напишіть повідомлення..." style="width: 350px;">
            <button onclick="sendMessage()" style="width: 100px;">Надіслати</button>
        </div>
    </div>

    <script>
        var socket = io();
        var myNick = "";

        // Перевірка: чи заходив користувач раніше?
        if (localStorage.getItem('chat_registered')) {
            document.getElementById('user-email').style.display = 'none';
            document.getElementById('login-title').innerText = 'Вхід (з поверненням!)';
        }

        function startChat() {
            var nick = document.getElementById('user-nick').value.trim();
            var email = document.getElementById('user-email').value.trim();
            var pass = document.getElementById('user-pass').value;

            if (nick === "" || pass === "") {
                alert("Заповніть нік та пароль!");
                return;
            }

            // Якщо це перший раз (поле пошти видиме)
            if (document.getElementById('user-email').style.display !== 'none') {
                if (!email.includes("@")) {
                    alert("Введіть правильну пошту!");
                    return;
                }
                localStorage.setItem('chat_registered', 'true');
            }

            // Спеціальний вхід для тебе
            if (nick === "adminkgv2015" && pass === "gkv777555111a") {
                myNick = "Костя Гончаров";
            } else {
                myNick = nick;
            }

            document.getElementById('login-form').style.display = 'none';
            document.getElementById('chat-area').style.display = 'block';
            socket.emit('message', {'username': 'Система', 'message': myNick + ' увійшов у чат'});
        }

        function sendMessage() {
            var msgInput = document.getElementById('message');
            if (msgInput.value.trim() !== "") {
                socket.send({'username': myNick, 'message': msgInput.value});
                msgInput.value = "";
            }
        }

        socket.on('message', function(data) {
            var chatBox = document.getElementById('chat-box');
            var newMessage = document.createElement('div');
            newMessage.innerHTML = `<strong>${data.username}</strong>: ${data.message}`;
            chatBox.appendChild(newMessage);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
