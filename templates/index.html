Ось твій повний файл index.html. Я зберіг усі твої оригінальні функції (музику, камеру, кружечки) та додав систему відповідей і стрічку повідомлень, про які ти просив.

HTML
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TG Chat Pro</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        /* Твої оригінальні стилі */
        * { box-sizing: border-box; }
        body { margin: 0; background: #0e1621; color: white; font-family: sans-serif; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        #login-overlay { position: fixed; inset: 0; background: #17212b; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #0e1621; padding: 25px; border-radius: 15px; display: flex; flex-direction: column; gap: 10px; width: 90%; max-width: 320px; }
        .login-card input { padding: 12px; border-radius: 8px; border: 1px solid #2b5278; background: #17212b; color: white; outline: none; }
        .login-card button { padding: 12px; background: #2b5278; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        #main-ui { display: none; flex-direction: column; height: 100%; }
        #top-bar { background: #17212b; padding: 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #2b5278; }
        #online-counter { color: yellow; font-weight: bold; font-size: 12px; }
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg-row { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; }
        .my-row { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { background: #182533; padding: 8px 12px; border-radius: 15px; position: relative; word-wrap: break-word; }
        .my-row .bubble { background: #2b5278; }
        .msg-img-ava { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; }
        .msg-time { font-size: 9px; color: #8fa1b3; margin-top: 4px; display: block; text-align: right; }
        .system-alert { align-self: center; background: rgba(255, 255, 0, 0.1); border: 1px solid yellow; color: yellow; padding: 8px 15px; border-radius: 10px; text-align: center; font-weight: bold; margin: 10px 0; width: 90%; }
        .video-circle { width: 200px; height: 200px; border-radius: 50%; object-fit: cover; border: 2px solid #5288c1; }
        #input-area { background: #17212b; padding: 10px 10px calc(15px + env(safe-area-inset-bottom)) 10px; display: none; align-items: center; gap: 8px; border-top: 1px solid #2b5278; }
        .in-field { flex-grow: 1; background: none; border: none; color: white; outline: none; font-size: 16px; }
        .icon-btn { background: none; border: none; cursor: pointer; color: #6c7883; font-size: 22px; padding: 5px; }
        .rec-active { color: #ef4444 !important; }
        #preview-container { display: none; position: fixed; bottom: 120px; right: 20px; z-index: 1000; }
        #v-preview { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 3px solid #ef4444; }

        /* Нові стилі для відповідей */
        .reply-preview { background: rgba(82, 136, 193, 0.1); border-left: 3px solid #5288c1; padding: 4px 8px; margin-bottom: 5px; font-size: 11px; border-radius: 4px; color: #8fa1b3; }
        .comment-btn { background: none; border: none; color: #5288c1; font-size: 11px; font-weight: bold; cursor: pointer; padding: 5px 0; display: block; }
        #reply-bar { display: none; background: #17212b; padding: 5px 15px; border-top: 1px solid #2b5278; font-size: 12px; color: #5288c1; justify-content: space-between; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h3>Вхід</h3>
        <input type="text" id="u-nick" placeholder="Нік">
        <input type="password" id="u-pass" placeholder="Пароль">
        <input type="email" id="u-email" placeholder="Пошта">
        <button onclick="auth()">УВІЙТИ</button>
    </div>
</div>

<div id="main-ui">
    <div id="top-bar">
        <div id="online-counter">Online: <span id="user-count">0</span></div>
        <button class="icon-btn" onclick="document.getElementById('m-pick').click()">🎵</button>
        <audio id="bg-audio" controls style="height:24px; flex-grow:1;"></audio>
        <input type="file" id="m-pick" style="display:none" accept="audio/*" onchange="addMusic(event)">
    </div>

    <div id="preview-container"><video id="v-preview" autoplay muted playsinline></video></div>
    
    <div id="chat-box"></div>

    <div id="reply-bar">
        <span id="reply-text"></span>
        <button onclick="cancelReply()" style="background:none; border:none; color:gray; cursor:pointer;">✕</button>
    </div>

    <div id="input-area">
        <button class="icon-btn" onclick="document.getElementById('f-input').click()">📎</button>
        <input type="file" id="f-input" style="display:none" accept="image/*" onchange="sendImg(event)">
        <input type="text" id="msg-input" class="in-field" placeholder="Повідомлення..." onkeypress="if(event.key==='Enter')sendTxt()">
        <button id="flip-btn" class="icon-btn" style="display:none;" onclick="switchCam()">🔄</button>
        <button id="rec-btn" class="icon-btn" onclick="toggleRec()">📷</button>
        <button class="icon-btn" style="color:#5288c1" onclick="sendTxt()">➤</button>
    </div>
</div>

<script>
    const socket = io({ transports: ['websocket'] });
    let myNick, myReal, myAva, facingMode = "user", mediaRecorder, chunks = [], currentStream;
    let selectedReply = null;

    function auth() {
        const n = document.getElementById('u-nick').value;
        const p = document.getElementById('u-pass').value;
        const e = document.getElementById('u-email').value;
        if(n && p) socket.emit('register_or_login', {nick: n, pass: p, email: e});
    }

    socket.on('auth_success', d => {
        myNick = d.nick; myReal = d.real_nick; myAva = d.avatar;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-ui').style.display = 'flex';
        document.getElementById('input-area').style.display = 'flex';
    });

    socket.on('update_online', d => document.getElementById('user-count').innerText = d.count);

    function addMusic(e) {
        if(e.target.files[0]) {
            const a = document.getElementById('bg-audio');
            a.src = URL.createObjectURL(e.target.files[0]);
            a.play();
        }
    }

    function setReply(author, text) {
        selectedReply = { author, text };
        document.getElementById('reply-bar').style.display = 'flex';
        document.getElementById('reply-text').innerText = `Відповідь: ${author}`;
        document.getElementById('msg-input').focus();
    }

    function cancelReply() {
        selectedReply = null;
        document.getElementById('reply-bar').style.display = 'none';
    }

    function sendTxt() {
        const i = document.getElementById('msg-input');
        if(!i.value.trim()) return;
        socket.emit('message', {
            username: myNick, 
            real_nick: myReal, 
            avatar: myAva, 
            message: i.value, 
            type: 'text',
            reply: selectedReply
        });
        i.value = "";
        cancelReply();
    }

    function sendImg(e) {
        const file = e.target.files[0]; if(!file) return;
        const r = new FileReader();
        r.onload = () => socket.emit('message', {username: myNick, real_nick: myReal, avatar: myAva, file: r.result, type: 'image', reply: selectedReply});
        r.readAsDataURL(file);
        cancelReply();
    }

    async function toggleRec() {
        const btn = document.getElementById('rec-btn'), flip = document.getElementById('flip-btn'), pre = document.getElementById('preview-container'), v = document.getElementById('v-preview');
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            try {
                currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode }, audio: true });
                v.srcObject = currentStream; pre.style.display = 'block'; flip.style.display = 'inline-block';
                mediaRecorder = new MediaRecorder(currentStream); chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const r = new FileReader();
                    r.onloadend = () => socket.emit('message', {username: myNick, real_nick: myReal, avatar: myAva, file: r.result, type: 'circle', reply: selectedReply});
                    r.readAsDataURL(new Blob(chunks, {type: "video/webm"}));
                    currentStream.getTracks().forEach(t => t.stop());
                    pre.style.display = 'none'; flip.style.display = 'none';
                    cancelReply();
                };
                mediaRecorder.start(); btn.classList.add('rec-active');
            } catch(e) { alert("Потрібен доступ до камери!"); }
        } else { mediaRecorder.stop(); btn.classList.remove('rec-active'); }
    }

    socket.on('message', d => {
        const box = document.getElementById('chat-box'), row = document.createElement('div');
        if (d.type === 'system_alert') {
            row.className = "system-alert";
            row.innerHTML = `⚠️ СИСТЕМА: ${d.message}`;
        } else {
            row.className = "msg-row " + (d.real_nick === myReal ? "my-row" : "");
            
            let replyHtml = d.reply ? `<div class="reply-preview"><b>${d.reply.author}:</b><br>${d.reply.text}</div>` : "";
            
            let h = "";
            if(d.type === 'text') h = `<div>${d.message}</div>`;
            else if(d.type === 'image') h = `<img src="${d.file}" style="max-width:180px; border-radius:10px;">`;
            else if(d.type === 'circle') h = `<video src="${d.file}" class="video-circle" autoplay loop playsinline muted onclick="this.muted=!this.muted"></video>`;
            
            row.innerHTML = `
                <img src="${d.avatar}" class="msg-img-ava">
                <div class="bubble">
                    ${replyHtml}
                    <b>${d.username}</b><br>
                    ${h}
                    <button class="comment-btn" onclick="setReply('${d.username}', '${d.message || 'Медіа'}')">Відповісти</button>
                    <span class="msg-time">${d.time || ''}</span>
                </div>`;
        }
        box.appendChild(row); box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
