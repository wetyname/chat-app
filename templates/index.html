<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Супер Чат</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #login-form { position: fixed; inset: 0; background: #1e293b; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; padding: 20px; }
        .in-field { width: 100%; max-width: 320px; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; }
        #chat-area { display: none; flex-direction: column; height: 100%; }
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #334155; padding: 8px 12px; border-radius: 12px; align-self: flex-start; max-width: 85%; position: relative; }
        .msg-time { font-size: 0.7em; color: #94a3b8; margin-bottom: 2px; display: block; }
        .circle-video { width: 180px; height: 180px; border-radius: 50%; object-fit: cover; border: 2px solid #2563eb; display: block; margin-top: 5px; }
        #email-box { display: none; width: 100%; max-width: 320px; }
        .btn { background: #2563eb; color: white; border: none; font-weight: bold; cursor: pointer; }
        #online { text-align: center; padding: 5px; color: #facc15; font-size: 0.85em; background: #1e293b; }
    </style>
</head>
<body>

    <div id="login-form">
        <h2>Вхід у Чат</h2>
        <input type="text" id="u-nick" class="in-field" placeholder="Нікнейм">
        <div id="email-box">
            <input type="email" id="u-email" class="in-field" placeholder="Твій Email">
        </div>
        <input type="password" id="u-pass" class="in-field" placeholder="Пароль">
        <button class="in-field btn" onclick="auth()">Увійти</button>
    </div>

    <div id="chat-area">
        <div id="online">В мережі: 0</div>
        <div id="chat-box"></div>
        <div style="padding:10px; display:flex; gap:10px; background:#1e293b;">
            <button id="v-btn" onclick="toggleRec()" style="border-radius:50%; width:45px; height:45px; border:none; background:#2563eb; color:white;">🎬</button>
            <input type="text" id="m-text" class="in-field" style="flex-grow:1;" placeholder="Повідомлення..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" class="btn" style="width:50px; border-radius:50%;">></button>
        </div>
    </div>

    <script>
        var socket = io();
        var myID = "";
        var mediaRecorder;
        var videoChunks = [];

        function auth() {
            let n = document.getElementById('u-nick').value.trim();
            let p = document.getElementById('u-pass').value;
            let e = document.getElementById('u-email').value.trim();
            socket.emit('register_or_login', {nick: n, pass: p, email: e});
        }

        socket.on('need_email', () => {
            document.getElementById('email-box').style.display = 'block';
            alert("Ви новий користувач! Введіть пошту.");
        });

        socket.on('auth_success', data => {
            myID = data.nick;
            alert("ПРАВИЛА: Не ображати інших!");
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('chat-area').style.display = 'flex';
        });

        socket.on('auth_error', d => alert(d.msg));
        socket.on('update_online', d => document.getElementById('online').innerText = "В мережі: " + d.count);

        function send() {
            let t = document.getElementById('m-text');
            if(t.value.trim()) {
                socket.emit('message', {username: myID, message: t.value});
                t.value = "";
            }
        }

        async function toggleRec() {
            const btn = document.getElementById('v-btn');
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                mediaRecorder = new MediaRecorder(stream);
                videoChunks = [];
                mediaRecorder.onstop = () => {
                    const reader = new FileReader();
                    reader.onloadend = () => socket.emit('message', {username: myID, message: '', video: reader.result});
                    reader.readAsDataURL(new Blob(videoChunks, {type: 'video/webm'}));
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.ondataavailable = e => videoChunks.push(e.data);
                mediaRecorder.start();
                btn.style.background = "red";
                setTimeout(() => { if(mediaRecorder.state==="recording") mediaRecorder.stop(); btn.style.background="#2563eb"; }, 10000);
            } else { mediaRecorder.stop(); btn.style.background="#2563eb"; }
        }

        socket.on('message', d => {
            let b = document.getElementById('chat-box');
            let div = document.createElement('div');
            div.className = "msg";
            let html = `<span class="msg-time">${d.time}</span><b>${d.username}:</b> ${d.message}`;
            if(d.video) html += `<br><video src="${d.video}" class="circle-video" autoplay loop muted playsinline></video>`;
            div.innerHTML = html;
            b.appendChild(div);
            b.scrollTop = b.scrollHeight;
        });
    </script>
</body>
