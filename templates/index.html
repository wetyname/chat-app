Ось повний код для файлу templates/index.html. Я зібрав докупи всі функції: реєстрацію, адмін-панель, час, лічильник, індикатор «пише» та команди для модерації.

HTML
<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GKV Chat Pro</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Форма входу */
        #login-form { position: fixed; inset: 0; background: #1e293b; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; padding: 20px; }
        .in-field { width: 100%; max-width: 320px; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; }
        
        /* Робоча зона чату */
        #chat-area { display: none; flex-direction: column; height: 100%; }
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        /* Стиль повідомлень */
        .msg { background: #334155; padding: 8px 12px; border-radius: 12px; align-self: flex-start; max-width: 85%; position: relative; }
        .msg-time { font-size: 0.7em; color: #94a3b8; display: block; margin-bottom: 2px; }
        .del-btn { color: #ef4444; cursor: pointer; margin-left: 8px; font-weight: bold; font-size: 0.9em; }
        
        #email-box { display: none; width: 100%; max-width: 320px; }
        .btn { background: #2563eb; color: white; border: none; font-weight: bold; cursor: pointer; }
        
        /* Верхня панель статусу */
        #online { text-align: center; padding: 5px; color: #facc15; font-size: 0.85em; background: #1e293b; min-height: 25px; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

    <div id="login-form">
        <h2 style="margin-bottom: 10px;">GKV Чат</h2>
        <input type="text" id="u-nick" class="in-field" placeholder="Нікнейм">
        <div id="email-box">
            <p style="color: #facc15; font-size: 0.8em; margin: 5px 0;">Реєстрація нової пошти:</p>
            <input type="email" id="u-email" class="in-field" placeholder="Твій Email">
        </div>
        <input type="password" id="u-pass" class="in-field" placeholder="Пароль">
        <button class="in-field btn" onclick="auth()">Увійти</button>
    </div>

    <div id="chat-area">
        <div id="online">Завантаження мережі...</div>
        <div id="chat-box"></div>
        <div style="padding:10px; display:flex; gap:10px; background:#1e293b; border-top: 1px solid #334155;">
            <input type="text" id="m-text" class="in-field" style="flex-grow:1;" placeholder="Напишіть повідомлення..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" class="btn" style="width:50px; border-radius:8px;">></button>
        </div>
    </div>

    <script>
        var socket = io();
        var myID = "";       // Відображуване ім'я
        var realNick = "";   // Логін (для перевірки адміна)
        var currentOnline = 0;
        
        // Фільтр слів
        const badWords = ["мат1", "мат2", "дурак"]; 

        function auth() {
            let n = document.getElementById('u-nick').value.trim();
            let p = document.getElementById('u-pass').value;
            let e = document.getElementById('u-email').value.trim();
            if(!n || !p) return alert("Введіть логін та пароль!");
            socket.emit('register_or_login', {nick: n, pass: p, email: e});
        }

        socket.on('need_email', () => {
            document.getElementById('email-box').style.display = 'block';
            alert("Ви новий користувач. Будь ласка, введіть пошту.");
        });

        socket.on('auth_success', data => {
            myID = data.nick;
            realNick = data.real_nick;
            
            // Показуємо правила тільки адміну або всім при вході
            alert("ПРАВИЛА:\n1. Не ображати інших.\n2. Не флудити.\nКоманди для адміна: /mute, /tban, /ban");
            
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('chat-area').style.display = 'flex';
        });

        socket.on('auth_error', d => alert(d.msg));

        // Статус онлайн та індикатор "пише..."
        socket.on('update_online', d => {
            currentOnline = d.count;
            document.getElementById('online').innerText = "В мережі: " + currentOnline;
        });

        let typeTimer;
        socket.on('is_typing', d => {
            document.getElementById('online').innerText = d.username + " пише...";
            clearTimeout(typeTimer);
            typeTimer = setTimeout(() => {
                document.getElementById('online').innerText = "В мережі: " + currentOnline;
            }, 2000);
        });

        // Слухаємо ввід тексту
        document.getElementById('m-text').addEventListener('input', () => {
            socket.emit('typing', {username: myID});
        });

        function send() {
            let t = document.getElementById('m-text');
            let txt = t.value.trim();
            if(!txt) return;

            // Перевірка на адмін-команди
            if(txt.startsWith('/') && realNick === "adminkgv2015") {
                socket.emit('admin_cmd', {admin: realNick, cmd: txt});
                t.value = "";
                return;
            }

            // Перевірка на погані слова
            if(badWords.some(w => txt.toLowerCase().includes(w))) {
                alert("Ваше повідомлення містить заборонені слова!");
                t.value = "";
                return;
            }

            socket.emit('message', {username: myID, real_nick: realNick, message: txt});
            t.value = "";
        }

        socket.on('message', d => {
            let b = document.getElementById('chat-box');
            let div = document.createElement('div');
            div.className = "msg";
            
            // Формуємо вміст: час + ім'я + текст
            let html = `<span class="msg-time">${d.time || ''}</span><b>${d.username}:</b> ${d.message}`;
            
            // Додаємо кнопку видалення для власних повідомлень
            if(d.username === myID) {
                html += `<span class="del-btn" title="Видалити" onclick="this.parentElement.remove()">✕</span>`;
            }

            div.innerHTML = html;
            b.appendChild(div);
            
            // Автопрокрутка вниз
            b.scrollTop = b.scrollHeight;
        });
    </script>
</body>
</html>
