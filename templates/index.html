<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Мій Чат</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; padding: 0; background-color: #0f172a; font-family: sans-serif; overflow: hidden; }
        
        #login-form { position: fixed; inset: 0; background: #1e293b; padding: 20px; display: flex; flex-direction: column; justify-content: center; z-index: 100; }
        
        #chat-area { display: none; flex-direction: column; height: 100dvh; } /* 100dvh допомагає на мобільних */
        
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; color: white; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        
        #input-area { 
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #1e293b; padding: 10px; display: flex; gap: 8px; 
            border-top: 1px solid #334155; align-items: center;
        }
        
        input { padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; font-size: 16px; }
        #m-text { flex-grow: 1; }
        
        button { padding: 12px 15px; background: #2563eb; color: white; border: none; border-radius: 8px; font-weight: bold; }
        
        .msg { background: #334155; padding: 8px 12px; border-radius: 12px; align-self: flex-start; max-width: 85%; }
        .my-msg { align-self: flex-end; background: #2563eb; }
        .chat-img { max-width: 100%; border-radius: 8px; margin-top: 5px; }
        .msg-time { font-size: 0.7em; opacity: 0.7; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="login-form">
        <h2 style="color:white; text-align:center;">Вхід</h2>
        <input type="text" id="u-nick" placeholder="Нікнейм">
        <input type="password" id="u-pass" placeholder="Пароль">
        <button onclick="enterChat()">Увійти</button>
    </div>

    <div id="chat-area">
        <div id="chat-box"></div>
        <div id="input-area">
            <input type="file" id="file-input" style="display:none" accept="image/*">
            <button onclick="document.getElementById('file-input').click()">📷</button>
            <input type="text" id="m-text" placeholder="Повідомлення...">
            <button onclick="sendMsg()">Відправити</button>
        </div>
    </div>

    <script>
        var socket = io();
        var myID = "";

        function enterChat() {
            var n = document.getElementById('u-nick').value.trim();
            var p = document.getElementById('u-pass').value;
            if(!n || !p) return;

            myID = (n === "adminkgv2015" && p === "gkv777555111a") ? "Костя Гончаров" : n;

            document.getElementById('login-form').style.display = 'none';
            document.getElementById('chat-area').style.display = 'flex';
            
            // Запит історії
            socket.emit('message', {'username': 'Система', 'message': myID + ' приєднався'});
        }

        function sendMsg() {
            var inp = document.getElementById('m-text');
            if(inp.value.trim() !== "") {
                socket.emit('message', {'username': myID, 'message': inp.value});
                inp.value = "";
            }
        }

        document.getElementById('file-input').onchange = function(e) {
            var file = e.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(event) {
                socket.emit('message', {'username': myID, 'message': '', 'image': event.target.result});
            };
            reader.readAsDataURL(file);
        };

        socket.on('message', function(data) {
            var box = document.getElementById('chat-box');
            var div = document.createElement('div');
            
            var isMe = (data.username === myID);
            div.className = "msg" + (isMe ? " my-msg" : "");
            
            var imgTag = data.image ? `<br><img src="${data.image}" class="chat-img">` : "";
            div.innerHTML = `<strong>${data.username}</strong>: ${data.message} ${imgTag} <span class="msg-time">${data.time || ''}</span>`;
            
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        });

        // Фікс для клавіатури на телефонах
        window.visualViewport.addEventListener('resize', () => {
            document.getElementById('chat-area').style.height = window.visualViewport.height + 'px';
            window.scrollTo(0, 0);
        });
    </script>
</body>
</html>
