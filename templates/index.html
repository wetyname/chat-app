<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приватний Чат</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Панель музики */
        #music-panel { background: #1e293b; padding: 10px; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 10px; z-index: 10; }
        
        /* Випадаючий список (Плейліст) */
        .dropdown { position: relative; display: inline-block; }
        .dropdown-content { 
            display: none; 
            position: absolute; 
            background-color: #1e293b; 
            min-width: 200px; 
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.5); 
            z-index: 100; 
            border: 1px solid #475569;
            border-radius: 8px;
            margin-top: 5px;
        }
        .dropdown-content button { 
            color: #facc15; 
            padding: 12px 16px; 
            text-decoration: none; 
            display: block; 
            background: none; 
            border: none; 
            width: 100%; 
            text-align: left; 
            cursor: pointer;
        }
        .dropdown-content button:hover { background-color: #334155; }
        .show { display: block; }

        .music-btn { background: #334155; color: #facc15; border: 1px solid #475569; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        #file-input { display: none; }

        /* Чат */
        #login-form { position: fixed; inset: 0; background: #1e293b; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 15px; padding: 20px; }
        .in-field { width: 100%; max-width: 320px; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; outline: none; }
        #chat-area { display: none; flex-direction: column; height: 100%; }
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #334155; padding: 10px; border-radius: 12px; align-self: flex-start; max-width: 80%; }
        .del-btn { color: #ef4444; cursor: pointer; margin-left: 10px; }
        #online { text-align: center; padding: 5px; color: #facc15; font-size: 0.8em; background: #1e293b; }
    </style>
</head>
<body>

    <audio id="drop-sound" src="https://www.soundjay.com/buttons/sounds/button-20.mp3" preload="auto"></audio>
    <audio id="bg-audio" loop></audio>

    <div id="login-form">
        <h2>Вхід у чат</h2>
        <input type="text" id="u-nick" class="in-field" placeholder="Нікнейм">
        <input type="password" id="u-pass" class="in-field" placeholder="Пароль">
        <button class="in-field btn" style="background:#2563eb; color:white; border:none; font-weight:bold;" onclick="auth()">Увійти</button>
    </div>

    <div id="chat-area">
        <div id="music-panel">
            <div class="dropdown">
                <button onclick="togglePlaylist()" class="music-btn">🎵 Плейліст</button>
                <div id="playlistMenu" class="dropdown-content">
                    <button onclick="playMusic('https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Kosta_T/Ukr_Folk/Kosta_T_-_01_-_Hop_Tsa-Tsa.mp3', 'Гоп! Ца-Ца!')">🕺 Гоп! Ца-Ца!</button>
                    <button onclick="playMusic('https://archive.org/download/ukrainian-folk-songs/OyKhtoPye.mp3', 'Ой, хто п\'є...')">🥂 Ой, хто п'є...</button>
                    <button onclick="playMusic('https://upload.wikimedia.org/wikipedia/commons/b/b3/Ty_zh_mene_pidmanula.ogg', 'Підманула')">💃 Ти ж мене підманула</button>
                    <hr style="border: 0.5px solid #475569; margin: 0;">
                    <label style="display:block; padding:12px 16px; cursor:pointer; color:#2563eb;" for="file-input">+ Своя пісня</label>
                </div>
            </div>
            
            <input type="file" id="file-input" accept="audio/*">
            <button class="music-btn" onclick="document.getElementById('bg-audio').pause()" style="color:#ef4444; border-color:#ef4444;">⏸ Стоп</button>
            <span id="song-name" style="color: #94a3b8; font-size: 0.8em;">не грає</span>
        </div>

        <div id="online">В мережі: 0</div>
        <div id="chat-box"></div>
        
        <div style="padding:10px; display:flex; gap:10px; background:#1e293b;">
            <input type="text" id="m-text" class="in-field" style="flex-grow:1;" placeholder="Повідомлення..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" style="background:#2563eb; color:white; border:none; width:50px; border-radius:8px;">></button>
        </div>
    </div>

    <script>
        var socket = io();
        var myID = "", realNick = "";
        var currentOnline = 0;

        // Функція для показу/ховання плейліста
        function togglePlaylist() {
            document.getElementById("playlistMenu").classList.toggle("show");
        }

        // Закриваємо плейліст, якщо клікнули повз нього
        window.onclick = function(event) {
            if (!event.target.matches('.music-btn')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    var openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
        }

        function playMusic(url, name) {
            const player = document.getElementById('bg-audio');
            player.src = url;
            player.play().catch(() => alert("Клікніть на екран!"));
            document.getElementById('song-name').innerText = name;
        }

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                playMusic(URL.createObjectURL(file), file.name);
            }
        });

        function auth() {
            let n = document.getElementById('u-nick').value.trim();
            let p = document.getElementById('u-pass').value;
            socket.emit('register_or_login', {nick: n, pass: p});
        }

        socket.on('auth_success', data => {
            myID = data.nick; realNick = data.real_nick;
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('chat-area').style.display = 'flex';
        });

        socket.on('update_online', d => {
            currentOnline = d.count;
            document.getElementById('online').innerText = "В мережі: " + currentOnline;
        });

        function send() {
            let t = document.getElementById('m-text'), txt = t.value.trim();
            if(!txt) return;
            if(txt.startsWith('/') && realNick === "adminkgv2015") {
                socket.emit('admin_cmd', {admin: realNick, cmd: txt});
                t.value = ""; return;
            }
            socket.emit('message', {username: myID, real_nick: realNick, message: txt});
            t.value = "";
        }

        socket.on('message', d => {
            let b = document.getElementById('chat-box');
            if (d.username !== myID && d.username !== 'Система') {
                document.getElementById('drop-sound').play().catch(()=>{});
            }
            let div = document.createElement('div');
            div.className = "msg";
            div.innerHTML = `<b>${d.username}:</b> ${d.message}`;
            if(d.username === myID) div.innerHTML += `<span class="del-btn" onclick="this.parentElement.remove()">✕</span>`;
            b.appendChild(div);
            b.scrollTop = b.scrollHeight;
        });
    </script>
</body>
</html>
