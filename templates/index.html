<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TG Chat Pro</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #0e1621; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #login-overlay { position: fixed; inset: 0; background: #17212b; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #0e1621; padding: 25px; border-radius: 15px; display: flex; flex-direction: column; gap: 12px; width: 300px; }
        .login-card input { padding: 12px; border-radius: 8px; border: 1px solid #2b5278; background: #17212b; color: white; }
        .login-card button { padding: 12px; background: #2b5278; color: white; border: none; border-radius: 8px; cursor: pointer; }
        #top-bar { background: #17212b; padding: 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #2b5278; }
        #online-counter { color: yellow; text-align: center; font-weight: bold; font-size: 14px; background: #17212b; padding: 5px; }
        #preview-container { display: none; position: fixed; bottom: 80px; right: 20px; z-index: 1000; }
        #v-preview { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 3px solid #ef4444; background: #000; transform: scaleX(-1); }
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .msg-row { display: flex; gap: 8px; max-width: 85%; align-items: flex-end; }
        .my-row { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { background: #182533; padding: 10px; border-radius: 15px; position: relative; min-width: 80px; }
        .my-row .bubble { background: #2b5278; }
        .msg-time { font-size: 10px; color: #8fa1b3; float: right; margin-top: 5px; margin-left: 8px; }
        .msg-img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .video-circle { width: 220px; height: 220px; border-radius: 50%; object-fit: cover; border: 2px solid #5288c1; }
        #input-area { background: #17212b; padding: 10px; display: none; align-items: center; gap: 12px; }
        .in-field { flex-grow: 1; background: none; border: none; color: white; outline: none; font-size: 16px; }
        .icon-btn { background: none; border: none; cursor: pointer; color: #6c7883; font-size: 24px; }
        .rec-active { color: #ef4444 !important; }
    </style>
</head>
<body>

<div id="login-overlay">
    <div class="login-card">
        <h3 style="text-align:center; margin:0;">Вхід</h3>
        <input type="text" id="u-nick" placeholder="Нікнейм">
        <input type="password" id="u-pass" placeholder="Пароль">
        <input type="email" id="u-email" placeholder="Пошта">
        <button onclick="auth()">Увійти</button>
    </div>
</div>

<div id="main-ui" style="display:none; flex-direction:column; height:100vh;">
    <div id="online-counter">В мережі: <span id="user-count">0</span></div>
    <div id="top-bar">
        <button class="icon-btn" onclick="document.getElementById('m-pick').click()">🎵+</button>
        <audio id="bg-audio" controls style="height:30px; flex-grow:1;"></audio>
        <input type="file" id="m-pick" style="display:none" accept="audio/*" onchange="addMusic(event)">
    </div>

    <div id="preview-container"><video id="v-preview" autoplay muted playsinline></video></div>
    <div id="chat-box"></div>

    <div id="input-area">
        <button class="icon-btn" onclick="document.getElementById('f-input').click()">📎</button>
        <input type="file" id="f-input" style="display:none" accept="image/*" onchange="sendImg(event)">
        <input type="text" id="msg-input" class="in-field" placeholder="Повідомлення..." onkeypress="if(event.key==='Enter')sendTxt()">
        <button class="icon-btn" onclick="switchCam()">🔄</button>
        <button id="rec-btn" class="icon-btn" onclick="toggleRec()">📷</button>
        <button class="icon-btn" style="color:#5288c1" onclick="sendTxt()">➤</button>
    </div>
</div>

<script>
    const socket = io();
    let myNick, myReal, myAva, facingMode = "user", mediaRecorder, chunks = [];

    function auth() {
        if(!socket.connected) return alert("З'єднуємо з сервером...");
        const n = document.getElementById('u-nick').value, p = document.getElementById('u-pass').value, e = document.getElementById('u-email').value;
        if(n && p) socket.emit('register_or_login', {nick:n, pass:p, email:e});
    }

    socket.on('auth_success', d => {
        myNick = d.nick; myReal = d.real_nick; myAva = d.avatar;
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-ui').style.display = 'flex';
        document.getElementById('input-area').style.display = 'flex';
    });

    socket.on('update_online', d => document.getElementById('user-count').innerText = d.count);

    function addMusic(e) {
        if(e.target.files[0]) {
            const a = document.getElementById('bg-audio');
            a.src = URL.createObjectURL(e.target.files[0]); a.play();
        }
    }

    function sendTxt() {
        const i = document.getElementById('msg-input'); if(!i.value.trim()) return;
        socket.emit('message', {username:myNick, real_nick:myReal, avatar:myAva, message:i.value, type:'text'});
        i.value = "";
    }

    function sendImg(e) {
        const r = new FileReader(); r.onload = () => socket.emit('message', {username:myNick, real_nick:myReal, avatar:myAva, file:r.result, type:'image'});
        r.readAsDataURL(e.target.files[0]);
    }

    function switchCam() { facingMode = (facingMode === "user") ? "environment" : "user"; }

    async function toggleRec() {
        const btn = document.getElementById('rec-btn'), preview = document.getElementById('preview-container'), vHead = document.getElementById('v-preview');
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: {facingMode: facingMode}, audio: true });
                vHead.srcObject = s; preview.style.display = 'block';
                mediaRecorder = new MediaRecorder(s); chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const b = new Blob(chunks, {type: "video/webm"});
                    const r = new FileReader(); r.onloadend = () => socket.emit('message', {username:myNick, real_nick:myReal, avatar:myAva, file:r.result, type:'circle'});
                    r.readAsDataURL(b); s.getTracks().forEach(t => t.stop()); preview.style.display = 'none';
                };
                mediaRecorder.start(); btn.classList.add('rec-active'); btn.innerText = "⏹";
            } catch(e) { alert("Помилка камери!"); }
        } else { mediaRecorder.stop(); btn.classList.remove('rec-active'); btn.innerText = "📷"; }
    }

    socket.on('message', d => {
        const box = document.getElementById('chat-box'), row = document.createElement('div');
        row.className = "msg-row " + (d.real_nick === myReal ? "my-row" : "");
        let con = "";
        if(d.type==='text') con = `<div>${d.message}</div>`;
        else if(d.type==='image') con = `<img src="${d.file}" style="max-width:250px; border-radius:10px;">`;
        else if(d.type==='circle') con = `<video src="${d.file}" class="video-circle" autoplay muted loop playsinline></video>`;
        row.innerHTML = `<img src="${d.avatar}" class="msg-img"><div class="bubble"><b>${d.username}</b><br>${con}<span class="msg-time">${d.time || ''}</span></div>`;
        box.appendChild(row); box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
