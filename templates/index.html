<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat TG Style</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #0e1621; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Вікно входу */
        #login-form { position: fixed; inset: 0; background: #17212b; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .login-in { padding: 12px; width: 250px; border-radius: 8px; border: 1px solid #2b5278; background: #0e1621; color: white; }
        .login-btn { padding: 12px 25px; background: #2b5278; border: none; border-radius: 8px; color: white; cursor: pointer; }

        /* Чат */
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background: #0e1621; }
        .msg-row { display: flex; gap: 10px; max-width: 85%; align-items: flex-end; }
        .my-row { align-self: flex-end; flex-direction: row-reverse; }
        .msg-img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .bubble { background: #182533; padding: 10px; border-radius: 12px; line-height: 1.4; position: relative; }
        .my-row .bubble { background: #2b5278; }

        /* Медіа */
        .chat-image { max-width: 250px; border-radius: 10px; margin-top: 5px; }
        .video-circle { width: 220px; height: 220px; border-radius: 50%; object-fit: cover; border: 2px solid #5288c1; background: black; }

        /* Панель вводу */
        #input-area { background: #17212b; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #2b5278; }
        .in-field { flex-grow: 1; background: none; border: none; color: white; outline: none; font-size: 16px; }
        .icon-btn { background: none; border: none; cursor: pointer; color: #6c7883; font-size: 24px; }
        .rec-active { color: #ef4444 !important; }
    </style>
</head>
<body>

<div id="login-form">
    <h2>Вхід у чат</h2>
    <input type="text" id="u-nick" class="login-in" placeholder="Нікнейм">
    <input type="password" id="u-pass" class="login-in" placeholder="Пароль">
    <button class="login-btn" onclick="auth()">Увійти</button>
</div>

<div id="chat-box"></div>

<div id="input-area" style="display: none;">
    <button class="icon-btn" onclick="document.getElementById('f-input').click()">📎</button>
    <input type="file" id="f-input" style="display:none" accept="image/*" onchange="sendImg(event)">
    
    <input type="text" id="msg-input" class="in-field" placeholder="Повідомлення..." onkeypress="if(event.key==='Enter')sendTxt()">
    
    <button id="rec-btn" class="icon-btn" onclick="toggleRec()">📷</button>
    <button class="icon-btn" style="color: #5288c1;" onclick="sendTxt()">➤</button>
</div>

<script>
    const socket = io();
    let myNick = "", myReal = "", myAva = "";
    let mediaRecorder, chunks = [];

    function auth() {
        const n = document.getElementById('u-nick').value;
        const p = document.getElementById('u-pass').value;
        if(n && p) socket.emit('register_or_login', {nick: n, pass: p});
    }

    socket.on('auth_success', d => {
        myNick = d.nick; myReal = d.real_nick; myAva = d.avatar;
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('input-area').style.display = 'flex';
    });

    socket.on('auth_error', d => alert(d.msg));

    function sendTxt() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        socket.emit('message', { username: myNick, real_nick: myReal, avatar: myAva, message: inp.value, type: 'text' });
        inp.value = "";
    }

    function sendImg(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        reader.onload = () => socket.emit('message', { username: myNick, real_nick: myReal, avatar: myAva, file: reader.result, type: 'image' });
        reader.readAsDataURL(file);
    }

    async function toggleRec() {
        const btn = document.getElementById('rec-btn');
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                mediaRecorder = new MediaRecorder(stream);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: "video/webm" });
                    const reader = new FileReader();
                    reader.onloadend = () => socket.emit('message', { username: myNick, real_nick: myReal, avatar: myAva, file: reader.result, type: 'circle' });
                    reader.readAsDataURL(blob);
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                btn.classList.add('rec-active');
                btn.innerText = "⏹";
            } catch(e) { alert("Потрібен доступ до камери!"); }
        } else {
            mediaRecorder.stop();
            btn.classList.remove('rec-active');
            btn.innerText = "📷";
        }
    }

    socket.on('message', d => {
        const box = document.getElementById('chat-box');
        const row = document.createElement('div');
        row.className = "msg-row " + (d.real_nick === myReal ? "my-row" : "");
        
        let content = "";
        if (d.type === 'text') content = `<div>${d.message}</div>`;
        else if (d.type === 'image') content = `<img src="${d.file}" class="chat-image">`;
        else if (d.type === 'circle') content = `<video src="${d.file}" class="video-circle" autoplay muted loop playsinline></video>`;

        row.innerHTML = `<img src="${d.avatar}" class="msg-img"><div class="bubble"><b>${d.username}</b><br>${content}</div>`;
        box.appendChild(row);
        box.scrollTop = box.scrollHeight;
    });
</script>

</body>
</html>
