<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подслушано Недогарки</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #0e1621; color: white; font-family: sans-serif; height: 100dvh; display: flex; flex-direction: column; }
        
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { background: #182533; padding: 10px; border-radius: 15px; max-width: 85%; border: 1px solid #2b5278; align-self: flex-start; }
        
        #input-area { background: #17212b; padding: 15px; display: flex; gap: 10px; border-top: 1px solid #2b5278; }
        input { flex-grow: 1; background: #0e1621; border: 1px solid #2b5278; color: white; padding: 10px; border-radius: 10px; outline: none; }
        button { background: #5288c1; border: none; color: white; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div style="background:#17212b; padding:15px; text-align:center; font-weight:bold;">🤫 Анонімні Недогарки</div>

<div id="chat-box"></div>

<div id="input-area">
    <input type="text" id="msg-input" placeholder="Напишіть щось...">
    <button onclick="send()">🚀</button>
</div>

<script>
    const socket = io();

    function send() {
        const input = document.getElementById('msg-input');
        const txt = input.value.trim();
        if (!txt) return;

        // Перевірка ліміту 5 повідомлень
        let count = parseInt(localStorage.getItem('chat_count') || "0");
        let date = localStorage.getItem('chat_date');
        let today = new Date().toLocaleDateString();

        if (date !== today) { count = 0; }
        if (count >= 5) {
            alert("Твій ліміт (5 повідомлень) на сьогодні вичерпано!");
            return;
        }

        socket.emit('message', { message: txt });

        // Зберігаємо ліміт
        localStorage.setItem('chat_count', count + 1);
        localStorage.setItem('chat_date', today);
        input.value = "";
    }

    // Слухаємо Enter для відправки
    document.getElementById('msg-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') send();
    });

    socket.on('message', d => {
        const box = document.getElementById('chat-box'), row = document.createElement('div');
        row.innerHTML = `<div class="bubble">
            <b style="color:#5288c1; font-size:12px;">${d.username}</b><br>
            ${d.message}
            <small style="display:block; text-align:right; color:gray; font-size:9px; margin-top:4px;">${d.time}</small>
        </div>`;
        box.appendChild(row);
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
