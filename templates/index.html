<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chat v.beta.1.6</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        #top-bar { background: #1e293b; padding: 10px; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 12px; }
        #bg-audio { flex-grow: 1; height: 32px; border-radius: 20px; }
        audio::-webkit-media-controls-panel { width: calc(100% + 30px); }
        .btn { background: #334155; color: #facc15; border: 1px solid #475569; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .user-ava { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; border: 2px solid #2563eb; cursor: pointer; }
        
        /* Плейліст */
        #playlist-ui { background: #1e293b; max-height: 100px; overflow-y: auto; font-size: 12px; padding: 5px 15px; border-bottom: 1px solid #334155; color: #94a3b8; }
        .track-item { padding: 2px 0; border-bottom: 1px solid #334155; }
        .track-active { color: #facc15; font-weight: bold; }

        #login-form { position: fixed; inset: 0; background: #1e293b; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 12px; padding: 20px; }
        .in-field { width: 100%; max-width: 300px; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; color: white; outline: none; }
        #chat-area { display: none; flex-direction: column; height: 100%; }
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg-row { display: flex; gap: 10px; max-width: 85%; align-items: flex-start; }
        .my-row { align-self: flex-end; flex-direction: row-reverse; }
        .msg-img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: #334155; }
        .bubble { background: #334155; padding: 10px; border-radius: 12px; }
        .my-row .bubble { background: #1e40af; }
        .del-btn { color: #94a3b8; cursor: pointer; margin-left: 8px; border: none; background: none; }
    </style>
</head>
<body>

    <div id="login-form">
        <h2>Вхід у чат</h2>
        <input type="text" id="u-nick" class="in-field" placeholder="Нікнейм">
        <input type="password" id="u-pass" class="in-field" placeholder="Пароль">
        <input type="email" id="u-email" class="in-field" placeholder="Пошта">
        <button class="in-field" style="background:#2563eb; cursor:pointer;" onclick="auth()">Увійти</button>
        <p id="err" style="color:#ef4444;"></p>
    </div>

    <div id="chat-area">
        <div id="top-bar">
            <img id="my-head-ava" class="user-ava" onclick="document.getElementById('ava-pick').click()">
            <input type="file" id="ava-pick" style="display:none" onchange="updateAva(event)">
            
            <button class="btn" onclick="document.getElementById('music-pick').click()">+ 🎵 Пісня</button>
            <input type="file" id="music-pick" accept="audio/*" style="display:none" onchange="addToPlaylist(event)">
            
            <audio id="bg-audio" controls></audio>
        </div>
        <div id="playlist-ui">Черга пуста</div>
        <div id="chat-box"></div>
        <div style="padding:10px; display:flex; gap:8px; background:#1e293b;">
            <input type="text" id="msg-input" class="in-field" style="flex-grow:1;" onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" style="background:#2563eb; color:white; border:none; width:50px; border-radius:8px;">➤</button>
        </div>
    </div>

    <script>
        var socket = io();
        var myNick = "", myReal = "", myAva = "";
        var playlist = [];
        var currentIndex = 0;

        function auth() {
            let n = document.getElementById('u-nick').value.trim(), p = document.getElementById('u-pass').value, e = document.getElementById('u-email').value.trim();
            if(n && p) socket.emit('register_or_login', {nick: n, pass: p, email: e});
        }

        socket.on('auth_success', d => {
            myNick = d.nick; myReal = d.real_nick; myAva = d.avatar;
            document.getElementById('my-head-ava').src = myAva;
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('chat-area').style.display = 'flex';
        });

        function updateAva(e) {
            let f = e.target.files[0];
            if(f) {
                let r = new FileReader();
                r.onload = (ev) => socket.emit('update_avatar', {real_nick: myReal, avatar: ev.target.result});
                r.readAsDataURL(f);
            }
        }

        socket.on('avatar_changed', d => { if(d.real_nick === myReal) document.getElementById('my-head-ava').src = d.avatar; });

        // Додавання однієї пісні в чергу
        function addToPlaylist(event) {
            let file = event.target.files[0];
            if (file) {
                playlist.push(file);
                updatePlaylistUI();
                if (playlist.length === 1 || document.getElementById('bg-audio').paused && document.getElementById('bg-audio').src === "") {
                    playTrack(currentIndex);
                }
            }
        }

        function updatePlaylistUI() {
            let ui = document.getElementById('playlist-ui');
            ui.innerHTML = playlist.map((f, i) => `<div class="track-item ${i===currentIndex?'track-active':''}">#${i+1} ${f.name}</div>`).join('');
        }

        function playTrack(index) {
            if (index >= playlist.length) return;
            let p = document.getElementById('bg-audio');
            p.src = URL.createObjectURL(playlist[index]);
            p.play();
            updatePlaylistUI();
            p.onended = () => {
                currentIndex++;
                if (currentIndex < playlist.length) playTrack(currentIndex);
            };
        }

        function send() {
            let i = document.getElementById('msg-input'), txt = i.value.trim();
            if(!txt) return;
            socket.emit('message', {username: myNick, real_nick: myReal, message: txt, msg_id: "m-" + Date.now(), avatar: myAva});
            i.value = "";
        }

        socket.on('message', d => {
            let b = document.getElementById('chat-box'), row = document.createElement('div'), isMy = d.real_nick === myReal;
            row.className = "msg-row" + (isMy ? " my-row" : ""); row.id = d.msg_id;
            let del = isMy ? `<button class="del-btn" onclick="socket.emit('delete_message', {msg_id:'${d.msg_id}'})">✖</button>` : "";
            row.innerHTML = `<img class="msg-img" src="${d.avatar}"><div class="bubble"><b>${d.username}</b><br>${d.message}${del}</div>`;
            b.appendChild(row); b.scrollTop = b.scrollHeight;
        });

        socket.on('remove_msg', d => { let el = document.getElementById(d.msg_id); if(el) el.remove(); });
    </script>
</body>
</html>
