<style>
    .record-btn {
        width: 45px; height: 45px; border-radius: 50%;
        background: #2563eb; color: white; border: none;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-size: 20px; transition: 0.3s;
    }
    .recording { background: #ef4444; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    
    /* Відео-кружечок у чаті */
    .video-circle {
        width: 200px; height: 200px; border-radius: 50%;
        object-fit: cover; border: 3px solid #2563eb;
    }
</style>

<div style="padding:10px; display:flex; gap:10px; background:#1e293b; align-items:center;">
    <button class="btn" onclick="document.getElementById('p-pick').click()">📎</button>
    
    <input type="text" id="msg-input" class="in-field" style="flex-grow:1;" placeholder="Повідомлення...">
    
    <button id="rec-btn" class="record-btn" onclick="toggleRecord()">
        <span id="rec-icon">📷</span>
    </button>

    <input type="file" id="p-pick" style="display:none" accept="image/*,video/*" onchange="uploadFile(event)">
</div>

<script>
    let mediaRecorder;
    let recordedChunks = [];

    async function toggleRecord() {
        const btn = document.getElementById('rec-btn');
        const icon = document.getElementById('rec-icon');

        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            // Починаємо запис
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            mediaRecorder = new MediaRecorder(stream);
            recordedChunks = [];

            mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: "video/webm" });
                const reader = new FileReader();
                reader.onloadend = () => {
                    socket.emit('send_media', {
                        username: myNick, real_nick: myReal, avatar: myAva,
                        type: 'circle', file: reader.result
                    });
                };
                reader.readAsDataURL(blob);
                stream.getTracks().forEach(track => track.stop());
            };

            mediaRecorder.start();
            btn.classList.add('recording');
            icon.innerText = "⏹";
            
            // Авто-стоп через 30 сек
            setTimeout(() => { if(mediaRecorder.state === "recording") toggleRecord(); }, 30000);
        } else {
            // Зупиняємо запис
            mediaRecorder.stop();
            btn.classList.remove('recording');
            icon.innerText = "📷";
        }
    }

    // Виправлення появи повідомлень
    socket.on('message', d => {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = "msg-row " + (d.real_nick === myReal ? "my-row" : "");
        
        let content = "";
        if (d.type === 'circle') {
            content = `<video src="${d.url || d.file}" class="video-circle" autoplay muted loop></video>`;
        } else if (d.type === 'image') {
            content = `<img src="${d.file}" style="max-width:200px; border-radius:10px;">`;
        } else {
            content = `<div>${d.message}</div>`;
        }

        div.innerHTML = `<img src="${d.avatar}" class="msg-img"><div class="bubble"><b>${d.username}</b>${content}</div>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    });
</script>
