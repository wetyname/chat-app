<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анонімний Чат</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background: #0e1621; color: white; font-family: sans-serif; height: 100dvh; display: flex; flex-direction: column; }
        
        #chat-box { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .bubble { background: #182533; padding: 10px; border-radius: 15px; max-width: 85%; border: 1px solid #2b5278; align-self: flex-start; cursor: pointer; }
        .reply-box { background: rgba(82, 136, 193, 0.1); border-left: 3px solid #5288c1; padding: 5px 8px; margin-bottom: 5px; border-radius: 4px; font-size: 11px; color: #aaa; }
        .bubble img, .bubble video { max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; }
        
        #input-container { background: #17212b; border-top: 1px solid #2b5278; padding: 10px; }
        #reply-preview { display: none; background: #0e1621; padding: 8px; border-radius: 10px; margin-bottom: 8px; font-size: 12px; border-left: 3px solid #5288c1; position: relative; }
        #input-row { display: flex; gap: 8px; align-items: center; }
        input { flex-grow: 1; background: #0e1621; border: 1px solid #2b5278; color: white; padding: 12px; border-radius: 12px; outline: none; }
        button { background: #5288c1; border: none; color: white; padding: 10px 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .btn-file { background: #2b5278; font-size: 18px; }
    </style>
</head>
<body>

<div style="background:#17212b; padding:15px; text-align:center; font-weight:bold;">🤫 Анонімні Недогарки</div>
<div id="chat-box"></div>

<div id="input-container">
    <div id="reply-preview">
        <span onclick="cancelReply()" style="position:absolute; right:10px; cursor:pointer;">✕</span>
        <b style="color:#5288c1">Відповідь</b><br>
        <span id="reply-text" style="color:gray"></span>
    </div>
    <div id="input-row">
        <button class="btn-file" onclick="document.getElementById('f-in').click()">📎</button>
        <input type="text" id="msg-input" placeholder="Повідомлення...">
        <button onclick="send()">🚀</button>
    </div>
</div>

<input type="file" id="f-in" style="display:none" accept="image/*,video/mp4,video/quicktime" onchange="loadFile(event)">

<script>
    const socket = io();
    let selectedFile = null;
    let currentReply = null;

    function loadFile(e) {
        const file = e.target.files[0];
        if (file && file.size > 15 * 1024 * 1024) return alert("Файл занадто великий (макс 15МБ)");
        const r = new FileReader();
        r.onload = () => { selectedFile = r.result; alert("Файл додано!"); };
        r.readAsDataURL(file);
    }

    function startReply(name, text) {
        currentReply = { name, text: text || "Медіа" };
        document.getElementById('reply-text').innerText = currentReply.text;
        document.getElementById('reply-preview').style.display = 'block';
    }

    function cancelReply() {
        currentReply = null;
        document.getElementById('reply-preview').style.display = 'none';
    }

    function send() {
        const input = document.getElementById('msg-input');
        const txt = input.value.trim();
        if (!txt && !selectedFile) return;

        let count = parseInt(localStorage.getItem('c') || "0");
        let today = new Date().toLocaleDateString();
        if (localStorage.getItem('d') !== today) count = 0;
        if (count >= 5) return alert("Ліміт вичерпано!");

        socket.emit('message', {
            message: txt,
            file: selectedFile,
            reply_to_name: currentReply ? currentReply.name : null,
            reply_to_msg: currentReply ? currentReply.text : null
        });

        localStorage.setItem('c', count + 1);
        localStorage.setItem('d', today);
        input.value = ""; selectedFile = null; cancelReply();
        document.getElementById('f-in').value = "";
    }

    socket.on('message', d => {
        const box = document.getElementById('chat-box'), row = document.createElement('div');
        let media = "";
        if (d.file) {
            if (d.file.includes("video")) media = `<video src="${d.file}" controls></video>`;
            else media = `<img src="${d.file}">`;
        }
        
        let reply = d.reply_to_msg ? `<div class="reply-box"><b>${d.reply_to_name}</b><br>${d.reply_to_msg.substring(0,30)}...</div>` : "";
        
        row.innerHTML = `<div class="bubble" onclick="startReply('${d.username}', '${d.message || "Медіа"}')">
            ${reply} <b style="color:#5288c1; font-size:12px;">${d.username}</b><br>
            ${d.message ? `<div>${d.message}</div>` : ""} ${media}
            <small style="display:block; text-align:right; color:gray; font-size:9px; margin-top:4px;">${d.time}</small>
        </div>`;
        box.appendChild(row);
        box.scrollTop = box.scrollHeight;
    });
</script>
</body>
</html>
