<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin:0; font-family:Arial; background:#0f172a; display:flex; justify-content:center; align-items:center; height:100vh; color:white; }
        .card { background:#1e293b; padding:30px; border-radius:15px; width:300px; box-shadow:0 10px 30px rgba(0,0,0,0.5); }
        input { width:100%; padding:12px; margin:10px 0; border:none; border-radius:8px; background:#0f172a; color:white; box-sizing: border-box; }
        button { width:100%; padding:12px; background:#3b82f6; border:none; border-radius:8px; color:white; cursor:pointer; }
        h2 { text-align:center; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Вхід / Реєстрація</h2>
        <form method="POST">
            <input name="name" placeholder="Твій Нік" required>
            <input name="email" type="email" placeholder="Твоя Пошта" required>
            <input name="password" type="password" placeholder="Твій Пароль" required>
            <button type="submit">Увійти в чат</button>
        </form>
    </div>
</body>
</html>
